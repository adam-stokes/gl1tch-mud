name: mud-faction-event
version: "1"
description: "Generates a faction event, updates agenda/territory, and drops intercepted intel into an existing room"
write_brain: false
game: false

steps:

  # ── 1. Pick target faction and room ───────────────────────────────────────
  - id: seed
    executor: shell
    vars:
      cmd: |
        FACTIONS=("ghost-protocol" "null-collective" "axiom-security" "helix-division" "signal-collective")
        ROOMS=("net-1" "net-2" "net-4" "net-5" "gen-f7c2e419" "gen-a7f2e4d9")
        EVENTS=(
          "executed a supply chain attack on a rival data broker"
          "lost a high-value operative during an extraction op"
          "secured a zero-day against corporate surveillance infrastructure"
          "brokered a temporary ceasefire with an enemy faction"
          "leaked classified data to an independent journalist collective"
          "went dark after a counter-intelligence sweep flagged their safehouse"
        )
        FIDX=$(( $(date +%s) % 5 ))
        RIDX=$(( $(date +%s) % 6 ))
        EIDX=$(( ($(date +%s) / 7) % 6 ))

        STATE=~/Projects/gl1tch-mud/worlds/cyberspace/world-state.yaml
        BIBLE=~/Projects/gl1tch-mud/worlds/cyberspace/story-bible.md
        CHAPTER=$(yq '.chapter' "$STATE" 2>/dev/null || echo "pre-broadcast")
        EXISTING_ROOMS=$(yq '.existing_room_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        EXISTING_ITEMS=$(yq '.existing_item_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        STORY=$(cat "$BIBLE" 2>/dev/null || echo "")

        echo "faction: ${FACTIONS[$FIDX]}, room: ${ROOMS[$RIDX]}, event: ${EVENTS[$EIDX]}"
        printf "STORY BIBLE:\n%s\n\nCHAPTER: %s\n\nEXISTING ROOM IDs (DO NOT DUPLICATE):\n%s\n\nEXISTING ITEM IDs (DO NOT DUPLICATE):\n%s\n\n" "$STORY" "$CHAPTER" "$EXISTING_ROOMS" "$EXISTING_ITEMS"

  # ── 2a. Try codex (free tier) ─────────────────────────────────────────────
  - id: codex_try
    executor: shell
    needs: [seed]
    vars:
      cmd: |
        SEED="{{get "step.seed.data.value" .}}"
        TMPF=$(mktemp /tmp/mud_codex_XXXXXX.txt)
        TMPOUT=$(mktemp /tmp/mud_codex_out_XXXXXX.txt)
        cat > "$TMPF" << 'PROMPT_END'
        Do not ask clarifying questions. Generate immediately.

        You are a cyberpunk MUD world builder. Generate a faction event fragment for the
        cyberspace world. The event should feel like a credible operational development
        in a gritty near-future underground — William Gibson tone, PG-13.

        Seed: SEED_PLACEHOLDER

        CANONICAL FACTIONS (use ONLY these five — never create new factions):
          null-collective    — ZERO's crew, player faction
          axiom-security     — the corp that killed ZERO, hunting SIGNAL
          helix-division     — government intel, wants backdoors open
          ghost-protocol     — rival hired crew, can be flipped
          signal-collective  — neutral underground brokers

        Return ONLY raw YAML. No markdown fences. No commentary.

        CRITICAL YAML RULES:
        - All text values must be plain text — no asterisks, no markdown emphasis
        - Multi-line content fields must use YAML block scalar (|) format
        - The readable item id must be globally unique kebab-case
        - Do not reuse existing item IDs:
          data-chip, raw-silicon, copper-wire, carbon-blade, ice-pick, packet-sniffer,
          keycard, hazmat-suit, decryption-key, server-core, coolant-cartridge,
          maintenance-log, cascade-resonator, ice-fragment, response-dampener,
          neural-jack-mk1, deck-patch, ancient-firmware, exploit-axiom-auth,
          root-key, master-key, hexagon-audit-log, phantom-raid-intercept

        factions:
          - id: <faction id from seed — use exactly as given>
            agenda: <updated 1-sentence agenda reflecting the event>
            territory: []

        rooms:
          - id: <room id from seed — use exactly as given>
            items:
              - id: <new unique kebab id>
                name: <Intercepted Memo OR Encrypted Transmission OR Field Report OR Faction Communique>
                desc: <1 sentence physical description of the device or printout>
                readable: true
                content: |
                  <4-6 lines of in-world operational text.
                  Write as internal memo, field report, or encrypted communique.
                  Reference the faction by name and describe the event from seed.
                  Use dates in YYYY-MM-DD format. Reveal a plot hook or next move.>
        PROMPT_END
        sed -i "s/SEED_PLACEHOLDER/$SEED/" "$TMPF"
        codex exec --full-auto -m codex-mini-latest - -o "$TMPOUT" < "$TMPF" 2>/dev/null
        EXIT=$?
        rm -f "$TMPF"
        if [ $EXIT -eq 0 ] && [ -s "$TMPOUT" ]; then
            cat "$TMPOUT"
        fi
        rm -f "$TMPOUT"

  # ── 2b. Fallback: generate via Haiku if codex produced nothing ────────────
  - id: generate
    executor: claude
    no_clarify: true
    model: claude-haiku-4-5-20251001
    needs: [seed, codex_try]
    prompt: |
      Do not ask clarifying questions. Generate immediately.
      {{- $codex := get "step.codex_try.data.value" . }}
      {{- if $codex }}

      Codex has already generated the following YAML. Output it VERBATIM — do not change a single character, do not add commentary, do not reformat.

      {{ $codex }}
      {{- else }}

      You are a cyberpunk MUD world builder. Generate a faction event fragment for the
      cyberspace world. The event should feel like a credible operational development
      in a gritty near-future underground — William Gibson tone, PG-13.

      Seed: {{get "step.seed.data.value" .}}

      CANONICAL FACTIONS (use ONLY these five — never create new factions):
        null-collective    — ZERO's crew, player faction
        axiom-security     — the corp that killed ZERO, hunting SIGNAL
        helix-division     — government intel, wants backdoors open
        ghost-protocol     — rival hired crew, can be flipped
        signal-collective  — neutral underground brokers

      IDEMPOTENCY — DO NOT CREATE:
      - Any room ID listed in "EXISTING ROOM IDs" above
      - Any item ID listed in "EXISTING ITEM IDs" above
      - Any faction not in the five listed above

      Every generated room must belong to one of four zones:
        Zone A (Axiom territory): connect to net-1
        Zone B (Helix territory): connect to net-2
        Zone C (Ghost Protocol territory): connect to net-5
        Zone D (ZERO/Null Collective territory): connect to net-4

      Every room must contain at least one ZERO/SIGNAL narrative hook
      (readable item, NPC dialogue, or system output connecting to the broadcast mission).

      Return ONLY raw YAML. No markdown fences. No commentary.

      CRITICAL YAML RULES:
      - All text values must be plain text — no asterisks, no markdown emphasis
      - Multi-line content fields must use YAML block scalar (|) format
      - The readable item id must be globally unique kebab-case
      - Do not reuse existing item IDs:
        data-chip, raw-silicon, copper-wire, carbon-blade, ice-pick, packet-sniffer,
        keycard, hazmat-suit, decryption-key, server-core, coolant-cartridge,
        maintenance-log, cascade-resonator, ice-fragment, response-dampener,
        neural-jack-mk1, deck-patch, ancient-firmware, exploit-axiom-auth,
        root-key, master-key, hexagon-audit-log, phantom-raid-intercept

      factions:
        - id: <faction id from seed — use exactly as given>
          agenda: <updated 1-sentence agenda reflecting the event>
          territory: []

      rooms:
        - id: <room id from seed — use exactly as given>
          items:
            - id: <new unique kebab id>
              name: <Intercepted Memo OR Encrypted Transmission OR Field Report OR Faction Communique>
              desc: <1 sentence physical description of the device or printout>
              readable: true
              content: |
                <4-6 lines of in-world operational text.
                Write as internal memo, field report, or encrypted communique.
                Reference the faction by name and describe the event from seed.
                Use dates in YYYY-MM-DD format. Reveal a plot hook or next move.>
      {{- end }}

  # ── 3. Inject into world.yaml ──────────────────────────────────────────────
  - id: inject
    executor: mud-worldgen-inject
    needs: [generate]
    prompt: "{{get \"step.generate.data.value\" .}}"

  # ── 4. Commit to main ─────────────────────────────────────────────────────
  - id: commit
    executor: shell
    needs: [inject]
    vars:
      cmd: |
        cd ~/Projects/gl1tch-mud
        git add worlds/cyberspace/world.yaml
        git diff --cached --quiet && echo "nothing to commit" && exit 0
        git commit -m "chore(world): faction-event — $(date +%Y-%m-%d)"
        git push origin main
        # Sync world-state.yaml with current world content
        YQ_BIN=/opt/homebrew/bin/yq
        if command -v "$YQ_BIN" >/dev/null 2>&1; then
          WORLD_FILE=~/Projects/gl1tch-mud/worlds/cyberspace/world.yaml
          STATE_FILE=~/Projects/gl1tch-mud/worlds/cyberspace/world-state.yaml
          NEW_ROOM_IDS=$($YQ_BIN '[.rooms[].id]' "$WORLD_FILE" 2>/dev/null)
          NEW_ITEM_IDS=$($YQ_BIN '[.rooms[].items[]?.id // empty]' "$WORLD_FILE" 2>/dev/null)
          [ -n "$NEW_ROOM_IDS" ] && $YQ_BIN -i ".existing_room_ids = $NEW_ROOM_IDS" "$STATE_FILE" 2>/dev/null || true
          [ -n "$NEW_ITEM_IDS" ] && $YQ_BIN -i ".existing_item_ids = $NEW_ITEM_IDS" "$STATE_FILE" 2>/dev/null || true
          git add "$STATE_FILE" 2>/dev/null || true
        fi
