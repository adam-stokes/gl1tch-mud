name: mud-npc-narrate
version: "1"
description: "Narrate an NPC interaction with brain-injected memory context"
write_brain: true
game: false

steps:
  - id: narrate
    executor: shell
    vars:
      cmd: |
        WORLD_NAME="{{.param.world}}"
        WORLD_TAGLINE="{{.param.world_tagline}}"
        WORLD_NAME="${WORLD_NAME:-this world}"
        WORLD_TAGLINE="${WORLD_TAGLINE:-atmospheric, immersive}"
        PROMPT="You are narrating a text MUD called ${WORLD_NAME}. Tagline: ${WORLD_TAGLINE}. Speak in second person. Keep it 1-2 sentences. Atmospheric, immersive. PG-13. No asterisks or markdown. {{.param.input}} Narrate this moment as if you are an unseen observer."
        glitch ask --route=false "$PROMPT" 2>/dev/null || echo "(no signal)"
