name: mud-npc-inject
version: "1"
description: "Generates 1-2 new NPCs with dialogue, trade, and loot table and injects them into an existing room"
write_brain: false
game: false

steps:

  # ── 1. Pick target room and NPC archetype ─────────────────────────────────
  - id: seed
    executor: shell
    vars:
      cmd: |
        WORLD="{{.param.world}}"
        WORLD="${WORLD:-cyberspace}"
        STATE=~/Projects/gl1tch-mud/worlds/$WORLD/world-state.yaml
        BIBLE=~/Projects/gl1tch-mud/worlds/$WORLD/story-bible.md
        YQ=/opt/homebrew/bin/yq

        # Read room IDs and pick one
        ROOM_IDS_STR=$($YQ '.existing_room_ids | join(" ")' "$STATE" 2>/dev/null || echo "")
        ROOMS=($ROOM_IDS_STR)
        RIDX=$(( $(date +%s) % ${#ROOMS[@]} ))
        ROOM="${ROOMS[$RIDX]}"

        # Read archetypes and pick one
        ARCHETYPE_COUNT=$($YQ '.npc_archetypes | length' "$STATE" 2>/dev/null || echo "0")
        if [ "$ARCHETYPE_COUNT" -gt 0 ]; then
          AIDX=$(( ($(date +%s) / 5) % ARCHETYPE_COUNT ))
          ARCHETYPE=$($YQ ".npc_archetypes[$AIDX]" "$STATE" 2>/dev/null)
        else
          ARCHETYPE="mysterious wanderer: purpose unknown, carries something important"
        fi

        CHAPTER=$($YQ '.chapter' "$STATE" 2>/dev/null || echo "unknown")
        EXISTING_ROOMS=$($YQ '.existing_room_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        EXISTING_ITEMS=$($YQ '.existing_item_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        FACTIONS=$($YQ '.active_factions | join(", ")' "$STATE" 2>/dev/null || echo "")
        STORY=$(cat "$BIBLE" 2>/dev/null || echo "")

        echo "world: $WORLD, room: $ROOM, archetype: $ARCHETYPE"
        printf "STORY BIBLE:\n%s\n\nCHAPTER: %s\n\nCANONICAL FACTIONS: %s\n\nEXISTING ROOM IDs (DO NOT DUPLICATE):\n%s\n\nEXISTING ITEM IDs (DO NOT DUPLICATE):\n%s\n\n" \
          "$STORY" "$CHAPTER" "$FACTIONS" "$EXISTING_ROOMS" "$EXISTING_ITEMS"

  # ── 2. Generate with Claude Haiku ─────────────────────────────────────────
  - id: generate
    executor: claude
    no_clarify: true
    model: claude-haiku-4-5-20251001
    needs: [seed]
    prompt: |
      Do not ask clarifying questions. Generate immediately.

      You are a world builder for the MUD described in the story bible below.
      Follow the world's tone, genre, and lore exactly as described there.

      Seed: {{get "step.seed.data.value" .}}

      The seed gives a TARGET ROOM ID and an NPC ARCHETYPE.
      Generate a rooms fragment containing ONLY the target room with 1-2 new NPCs.
      Also include a loot_table for each NPC.
      Return ONLY raw YAML. No markdown fences. No commentary.

      CRITICAL YAML RULES:
      - All text values must be plain text — no asterisks, no markdown
      - Multi-line fields use YAML block scalar (|)
      - Every id must be globally unique kebab-case

      Use ONLY the factions listed in CANONICAL FACTIONS above — do not invent new ones.
      Use ONLY items from EXISTING ITEM IDs for trades and loot. Do not reuse those IDs for new items.
      Do NOT create any room ID listed in EXISTING ROOM IDs.

      rooms:
        - id: <ROOM_ID from seed>
          name: placeholder
          desc: placeholder
          exits: {}
          npcs:
            - id: <unique-kebab-id>
              name: <NPC name appropriate to this world>
              desc: <1 sentence physical description fitting the world's aesthetic>
              hostile: false
              loot_table_id: <npc-id>-loot
              trades:
                - id: trade-<npc-id>-1
                  offer_item_id: <existing item id>
                  offer_item_name: <matching name>
                  receive_item_id: <any other existing item id>
                  receive_item_name: <matching name>
                  rep_required: 0
                  faction: none
              dialogue:
                - trigger: always
                  text: <plain prose, 1-2 sentences, in-character for this world>
                - trigger: <skill_gte:hacking:2 OR has_item:<item-id> OR rep_gte:<faction-id>:5>
                  text: <reveals something useful or dangerous about the world's main conflict>
          items: []
          systems: []
          locks: []

      loot_tables:
        - id: <npc-id>-loot
          entries:
            - item_id: <existing item id>
              name: <matching name>
              desc: <1 sentence>
              probability: 0.6
              count_min: 1
              count_max: 2
            - item_id: <another existing item id>
              name: <matching name>
              desc: <1 sentence>
              probability: 0.3
              count_min: 1
              count_max: 1

  # ── 3. Inject ──────────────────────────────────────────────────────────────
  - id: inject
    executor: mud-worldgen-inject
    needs: [generate]
    prompt: "{{get \"step.generate.data.value\" .}}"
    vars:
      mud_world: "~/Projects/gl1tch-mud/worlds/{{.param.world | default \"cyberspace\"}}/world.yaml"

  # ── 4. Commit ──────────────────────────────────────────────────────────────
  - id: commit
    executor: shell
    needs: [inject]
    vars:
      cmd: |
        WORLD="{{.param.world}}"
        WORLD="${WORLD:-cyberspace}"
        cd ~/Projects/gl1tch-mud
        git add worlds/$WORLD/world.yaml
        git diff --cached --quiet && echo "nothing to commit" && exit 0
        git commit -m "chore(world): npc-inject $WORLD — $(date +%Y-%m-%d)"
        git push origin main
        # Sync world-state.yaml with current world content
        YQ=/opt/homebrew/bin/yq
        if command -v "$YQ" >/dev/null 2>&1; then
          WORLD_FILE=~/Projects/gl1tch-mud/worlds/$WORLD/world.yaml
          STATE_FILE=~/Projects/gl1tch-mud/worlds/$WORLD/world-state.yaml
          NEW_ROOM_IDS=$($YQ '[.rooms[].id]' "$WORLD_FILE" 2>/dev/null)
          NEW_ITEM_IDS=$($YQ '[.rooms[].items[]?.id // empty]' "$WORLD_FILE" 2>/dev/null)
          [ -n "$NEW_ROOM_IDS" ] && $YQ -i ".existing_room_ids = $NEW_ROOM_IDS" "$STATE_FILE" 2>/dev/null || true
          [ -n "$NEW_ITEM_IDS" ] && $YQ -i ".existing_item_ids = $NEW_ITEM_IDS" "$STATE_FILE" 2>/dev/null || true
          git add "$STATE_FILE" 2>/dev/null || true
        fi
