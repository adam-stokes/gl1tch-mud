name: mud-npc-inject
version: "1"
description: "Generates 1-2 new NPCs with dialogue, trade, and loot table and injects them into an existing room"
write_brain: false
game: false

steps:

  # ── 1. Pick target room and NPC archetype ─────────────────────────────────
  - id: seed
    executor: shell
    vars:
      cmd: |
        ROOMS=("net-0" "net-1" "net-2" "net-3" "net-4" "net-5")
        ARCHETYPES=(
          "burned fixer: knows everyone, trusts no one, broker of last resort"
          "rogue sysadmin: jumped ship from Axiom, still has root on three dead systems"
          "data courier: anonymous, fast, no questions — for the right price"
          "black market augment dealer: back-alley neural installs, no warranty"
          "paranoid archivist: hoards erased history, speaks only in dead metaphors"
          "counter-ICE specialist: ex-corporate red team, now freelance and dangerous"
          "signal ghost: encrypted even in person, untraceable, speaks in one-time pads"
          "biometric forger: crafts clean identities from harvested corpsec credentials"
        )
        RIDX=$(( $(date +%s) % 6 ))
        AIDX=$(( ($(date +%s) / 5) % 8 ))

        STATE=~/Projects/gl1tch-mud/worlds/cyberspace/world-state.yaml
        BIBLE=~/Projects/gl1tch-mud/worlds/cyberspace/story-bible.md
        CHAPTER=$(yq '.chapter' "$STATE" 2>/dev/null || echo "pre-broadcast")
        EXISTING_ROOMS=$(yq '.existing_room_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        EXISTING_ITEMS=$(yq '.existing_item_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        STORY=$(cat "$BIBLE" 2>/dev/null || echo "")

        echo "room: ${ROOMS[$RIDX]}, archetype: ${ARCHETYPES[$AIDX]}"
        printf "STORY BIBLE:\n%s\n\nCHAPTER: %s\n\nEXISTING ROOM IDs (DO NOT DUPLICATE):\n%s\n\nEXISTING ITEM IDs (DO NOT DUPLICATE):\n%s\n\n" "$STORY" "$CHAPTER" "$EXISTING_ROOMS" "$EXISTING_ITEMS"

  # ── 2a. Try codex (free tier) ─────────────────────────────────────────────
  - id: codex_try
    executor: shell
    needs: [seed]
    vars:
      cmd: |
        SEED="{{get "step.seed.data.value" .}}"
        TMPF=$(mktemp /tmp/mud_codex_XXXXXX.txt)
        TMPOUT=$(mktemp /tmp/mud_codex_out_XXXXXX.txt)
        cat > "$TMPF" << 'PROMPT_END'
        Do not ask clarifying questions. Generate immediately.

        You are a world builder for a cyberpunk text MUD.
        Gritty near-future, corporate dystopia, hacker underground. PG-13.

        Seed: SEED_PLACEHOLDER

        The seed gives a TARGET ROOM ID and an NPC ARCHETYPE.
        Generate a rooms fragment containing ONLY the target room with 1-2 new NPCs.
        Also include a loot_table for each NPC.
        Return ONLY raw YAML. No markdown fences. No commentary.

        CRITICAL YAML RULES:
        - All text values must be plain text — no asterisks, no markdown
        - Multi-line fields use YAML block scalar (|)
        - Every id must be globally unique kebab-case

        EXISTING item IDs (use as loot/trade, do not reuse as new ids):
          data-chip, raw-silicon, copper-wire, carbon-blade, ice-pick, packet-sniffer,
          keycard, hazmat-suit, decryption-key, server-core, coolant-cartridge,
          maintenance-log, cascade-resonator, ice-fragment, response-dampener, neural-jack-mk1

        CANONICAL FACTIONS (reference only — do NOT create new faction entries):
          null-collective, axiom-security, helix-division, ghost-protocol, signal-collective

        rooms:
          - id: <ROOM_ID from seed>
            name: placeholder
            desc: placeholder
            exits: {}
            npcs:
              - id: <unique-kebab-id>
                name: <NPC name or handle>
                desc: <1 sentence physical description>
                hostile: false
                loot_table_id: <npc-id>-loot
                trades:
                  - id: trade-<npc-id>-1
                    offer_item_id: data-chip
                    offer_item_name: Data Chip
                    receive_item_id: <any existing item id>
                    receive_item_name: <matching name>
                    rep_required: 0
                    faction: none
                dialogue:
                  - trigger: always
                    text: <plain prose, 1-2 sentences, world-weary, in-character>
                  - trigger: <skill_gte:hacking:2 OR has_item:data-chip OR rep_gte:netrunners:5>
                    text: <reveals something dangerous or useful>
            items: []
            systems: []
            locks: []

        loot_tables:
          - id: <npc-id>-loot
            entries:
              - item_id: data-chip
                name: Data Chip
                desc: A fragment of stolen data.
                probability: 0.6
                count_min: 1
                count_max: 2
              - item_id: <existing item id>
                name: <matching name>
                desc: <1 sentence>
                probability: 0.3
                count_min: 1
                count_max: 1
        PROMPT_END
        sed -i "s/SEED_PLACEHOLDER/$SEED/" "$TMPF"
        codex exec --full-auto -m codex-mini-latest - -o "$TMPOUT" < "$TMPF" 2>/dev/null
        EXIT=$?
        rm -f "$TMPF"
        if [ $EXIT -eq 0 ] && [ -s "$TMPOUT" ]; then
            cat "$TMPOUT"
        fi
        rm -f "$TMPOUT"

  # ── 2b. Fallback: Haiku ────────────────────────────────────────────────────
  - id: generate
    executor: claude
    no_clarify: true
    model: claude-haiku-4-5-20251001
    needs: [seed, codex_try]
    prompt: |
      Do not ask clarifying questions. Generate immediately.
      {{- $codex := get "step.codex_try.data.value" . }}
      {{- if $codex }}

      Codex already generated the following YAML. Output it VERBATIM — do not change a character.

      {{ $codex }}
      {{- else }}

      You are a world builder for a cyberpunk text MUD.
      Gritty near-future, corporate dystopia, hacker underground. PG-13.

      Seed: {{get "step.seed.data.value" .}}

      The seed gives a TARGET ROOM ID and an NPC ARCHETYPE.
      Generate a rooms fragment containing ONLY the target room with 1-2 new NPCs.
      Also include a loot_table for each NPC.
      Return ONLY raw YAML. No markdown fences. No commentary.

      CRITICAL YAML RULES:
      - All text values must be plain text — no asterisks, no markdown
      - Multi-line fields use YAML block scalar (|)
      - Every id must be globally unique kebab-case

      EXISTING item IDs (use as loot/trade, do not reuse as new ids):
        data-chip, raw-silicon, copper-wire, carbon-blade, ice-pick, packet-sniffer,
        keycard, hazmat-suit, decryption-key, server-core, coolant-cartridge,
        maintenance-log, cascade-resonator, ice-fragment, response-dampener, neural-jack-mk1

      CANONICAL FACTIONS (use ONLY these five — never create new factions):
        null-collective    — ZERO's crew, player faction
        axiom-security     — the corp that killed ZERO, hunting SIGNAL
        helix-division     — government intel, wants backdoors open
        ghost-protocol     — rival hired crew, can be flipped
        signal-collective  — neutral underground brokers

      IDEMPOTENCY — DO NOT CREATE:
      - Any room ID listed in "EXISTING ROOM IDs" above
      - Any item ID listed in "EXISTING ITEM IDs" above
      - Any faction not in the five listed above

      Every generated room must belong to one of four zones:
        Zone A (Axiom territory): connect to net-1
        Zone B (Helix territory): connect to net-2
        Zone C (Ghost Protocol territory): connect to net-5
        Zone D (ZERO/Null Collective territory): connect to net-4

      Every room must contain at least one ZERO/SIGNAL narrative hook
      (readable item, NPC dialogue, or system output connecting to the broadcast mission).

      rooms:
        - id: <ROOM_ID from seed>
          name: placeholder
          desc: placeholder
          exits: {}
          npcs:
            - id: <unique-kebab-id>
              name: <NPC name or handle>
              desc: <1 sentence physical description>
              hostile: false
              loot_table_id: <npc-id>-loot
              trades:
                - id: trade-<npc-id>-1
                  offer_item_id: data-chip
                  offer_item_name: Data Chip
                  receive_item_id: <any existing item id>
                  receive_item_name: <matching name>
                  rep_required: 0
                  faction: none
              dialogue:
                - trigger: always
                  text: <plain prose, 1-2 sentences, world-weary, in-character>
                - trigger: <skill_gte:hacking:2 OR has_item:data-chip OR rep_gte:netrunners:5>
                  text: <reveals something dangerous or useful>
          items: []
          systems: []
          locks: []

      loot_tables:
        - id: <npc-id>-loot
          entries:
            - item_id: data-chip
              name: Data Chip
              desc: A fragment of stolen data.
              probability: 0.6
              count_min: 1
              count_max: 2
            - item_id: <existing item id>
              name: <matching name>
              desc: <1 sentence>
              probability: 0.3
              count_min: 1
              count_max: 1
      {{- end }}

  # ── 3. Inject ──────────────────────────────────────────────────────────────
  - id: inject
    executor: mud-worldgen-inject
    needs: [generate]
    prompt: "{{get \"step.generate.data.value\" .}}"

  # ── 4. Commit ──────────────────────────────────────────────────────────────
  - id: commit
    executor: shell
    needs: [inject]
    vars:
      cmd: |
        cd ~/Projects/gl1tch-mud
        git add worlds/cyberspace/world.yaml
        git diff --cached --quiet && echo "nothing to commit" && exit 0
        git commit -m "chore(world): npc-inject — $(date +%Y-%m-%d)"
        git push origin main
        # Sync world-state.yaml with current world content
        YQ_BIN=/opt/homebrew/bin/yq
        if command -v "$YQ_BIN" >/dev/null 2>&1; then
          WORLD_FILE=~/Projects/gl1tch-mud/worlds/cyberspace/world.yaml
          STATE_FILE=~/Projects/gl1tch-mud/worlds/cyberspace/world-state.yaml
          NEW_ROOM_IDS=$($YQ_BIN '[.rooms[].id]' "$WORLD_FILE" 2>/dev/null)
          NEW_ITEM_IDS=$($YQ_BIN '[.rooms[].items[]?.id // empty]' "$WORLD_FILE" 2>/dev/null)
          [ -n "$NEW_ROOM_IDS" ] && $YQ_BIN -i ".existing_room_ids = $NEW_ROOM_IDS" "$STATE_FILE" 2>/dev/null || true
          [ -n "$NEW_ITEM_IDS" ] && $YQ_BIN -i ".existing_item_ids = $NEW_ITEM_IDS" "$STATE_FILE" 2>/dev/null || true
          git add "$STATE_FILE" 2>/dev/null || true
        fi
