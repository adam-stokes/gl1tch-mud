name: mud-quest-generator
version: "1"
description: "Opus plans quest arcs from world state; Sonnet writes WorldQuest YAML + NPC dialogue patches; Haiku validates; inject wires quests into world.yaml"
write_brain: false
game: false

steps:

  # ── 1. Extract world state + NPC inventory for Opus ───────────────────────
  - id: worldstate
    executor: shell
    vars:
      cmd: |
        WORLD="{{.param.world}}"
        WORLD="${WORLD:-cyberspace}"
        WORLD_FILE=~/Projects/gl1tch-mud/worlds/$WORLD/world.yaml
        STATE=~/Projects/gl1tch-mud/worlds/$WORLD/world-state.yaml
        BIBLE=~/Projects/gl1tch-mud/worlds/$WORLD/story-bible.md
        YQ=/opt/homebrew/bin/yq

        # Factions with agenda
        FACTIONS=$($YQ '.factions[] | "  " + .id + ": " + .agenda' "$WORLD_FILE" 2>/dev/null | head -20)

        # All NPC IDs and names (for quest givers)
        NPCS=$($YQ '.rooms[].npcs[] | .id + "|" + .name' "$WORLD_FILE" 2>/dev/null | head -30)

        # All room IDs (for obj_room)
        ROOMS=$($YQ '.rooms[] | .id + "|" + .name' "$WORLD_FILE" 2>/dev/null)

        # Existing quest IDs (so we don't duplicate)
        QUEST_IDS=$($YQ '.quests[].id' "$WORLD_FILE" 2>/dev/null)

        # Hackable systems
        SYSTEMS=$($YQ '.rooms[].systems[] | .id' "$WORLD_FILE" 2>/dev/null | head -20)

        # Hostile NPCs (kill targets)
        HOSTILE=$($YQ '.rooms[].npcs[] | select(.hostile == true) | .id + "|" + .name' "$WORLD_FILE" 2>/dev/null | head -20)

        CHAPTER=$($YQ '.chapter' "$STATE" 2>/dev/null || echo "pre-broadcast")
        EXISTING_ROOMS=$($YQ '.existing_room_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        EXISTING_ITEMS=$($YQ '.existing_item_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        STORY=$(cat "$BIBLE" 2>/dev/null || echo "")

        printf "WORLD: %s\n\n" "$WORLD"
        printf "FACTIONS:\n%s\n\n" "$FACTIONS"
        printf "NPC ROSTER (id|name):\n%s\n\n" "$NPCS"
        printf "ROOMS (id|name):\n%s\n\n" "$ROOMS"
        printf "EXISTING QUEST IDs (do not duplicate):\n%s\n\n" "$QUEST_IDS"
        printf "HACKABLE SYSTEMS:\n%s\n\n" "$SYSTEMS"
        printf "HOSTILE NPCs (kill targets):\n%s\n\n" "$HOSTILE"
        printf "STORY BIBLE:\n%s\n\nCHAPTER: %s\n\nEXISTING ROOM IDs (DO NOT DUPLICATE):\n%s\n\nEXISTING ITEM IDs (DO NOT DUPLICATE):\n%s\n\n" "$STORY" "$CHAPTER" "$EXISTING_ROOMS" "$EXISTING_ITEMS"

  # ── 2. Opus: plan 3 quest arcs coherent with world state ──────────────────
  - id: plan
    executor: claude
    model: claude-opus-4-6
    no_clarify: true
    needs: [worldstate]
    prompt: |
      You are the quest director of the MUD described in the story bible above.
      Follow the world's genre, tone, and lore exactly. PG-13.

      WORLD STATE:
      {{get "step.worldstate.data.value" .}}

      Use ONLY the factions listed in the story bible above — do not invent new ones.

      TASK: Plan exactly 3 quest arcs that fit the current world state.

      Each quest must:
      - Use a real NPC from the NPC ROSTER as the giver (giver_npc_id)
      - Have a real room from the ROOM list as obj_room
      - Use a real system ID (for hack) or hostile NPC ID (for kill) or specific item concept (for retrieve)
      - NOT duplicate any existing quest ID
      - Feel connected to active faction tensions in the world

      Quest types:
      - kill: player must defeat an NPC (obj_target = hostile npc id)
      - hack: player must breach a system (obj_target = system id)
      - retrieve: player must obtain an item and return it (obj_target = item id they must find)

      For each quest, specify:

      QUEST 1:
      id: q-<unique-kebab — NOT matching any existing quest ID>
      title: <terse operational title>
      type: <kill|hack|retrieve>
      giver: <npc id from roster>
      target: <npc id OR system id OR item-concept-kebab>
      room: <room id where objective lives>
      count: <1 or 2>
      reward_credits: <600-2000>
      reward_item: <brief concept for reward item — will be generated>
      reward_tier: <signal|ghost|zero-day>
      narrative: <2-3 sentences — what this job is, why the giver needs it done, what's really going on underneath>
      faction_tension: <which two factions does this quest's outcome affect and how>

      QUEST 2:
      [same format]

      QUEST 3:
      [same format]

      Ensure the three quests together tell a coherent story — they should feel like
      they exist in the same world at the same moment. Cross-reference them.

  # ── 3. Sonnet: generate WorldQuest YAML + NPC dialogue patches ────────────
  - id: generate
    executor: claude
    model: claude-sonnet-4-6
    no_clarify: true
    needs: [worldstate, plan]
    prompt: |
      Do not ask clarifying questions. Generate immediately.

      You are a content generator for the MUD described in the story bible above.
      Generate the actual YAML for quests planned by the quest director.

      QUEST PLANS:
      {{get "step.plan.data.value" .}}

      WORLD STATE CONTEXT:
      {{get "step.worldstate.data.value" .}}

      Use ONLY the factions listed in the story bible above — do not invent new ones.

      IDEMPOTENCY — DO NOT CREATE:
      - Any room ID listed in "EXISTING ROOM IDs" above
      - Any item ID listed in "EXISTING ITEM IDs" above
      - Any faction not listed in the story bible

      Room exits must be {} — rooms are linked by the room-link pipeline separately.

      Every room must contain at least one narrative hook connecting to the world's
      central conflict (readable item, NPC dialogue, or system output).

      Use ONLY items from EXISTING ITEM IDs provided in the world state above
      when referencing existing items as retrieve targets.

      SIGNAL TIER SYSTEM: noise | signal | ghost | zero-day | flatline

      Return ONLY raw YAML. No markdown fences. No commentary. No prose.

      CRITICAL YAML RULES:
      - All text must be plain text — no asterisks, no markdown emphasis
      - Multi-line description fields use YAML block scalar (|)
      - Every id must be globally unique kebab-case
      - obj_type must be exactly: kill, hack, or retrieve
      - giver_npc_id must be an NPC id from the world state context
      - obj_room must be a room id from the world state context

      quests:
        - id: <quest id from plan>
          title: <quest title from plan>
          description: |
            <3-4 sentences. Write as if the NPC giver is briefing you directly.
            Operational tone — what the job is, what you'll face, what the payment is.
            Include one detail that hints at the faction tension from the plan.>
          giver_npc_id: <giver npc id from plan>
          obj_type: <kill|hack|retrieve>
          obj_target: <target id from plan>
          obj_room: <room id from plan>
          obj_count: <count from plan>
          reward_credits: <credits from plan>
          reward_xp_skill: hacking
          reward_xp_amount: <integer 50-200>
          reward_item_id: <new unique kebab id matching reward concept>
          reward_item_name: <reward item name>
          reward_item_desc: <1 sentence — what this item does, why it's valuable>
        - id: <quest 2 id>
          title: <quest 2 title>
          description: |
            <3-4 sentences>
          giver_npc_id: <giver 2>
          obj_type: <kill|hack|retrieve>
          obj_target: <target 2>
          obj_room: <room 2>
          obj_count: <count>
          reward_credits: <credits>
          reward_xp_skill: hacking
          reward_xp_amount: <integer>
          reward_item_id: <new unique kebab>
          reward_item_name: <name>
          reward_item_desc: <1 sentence>
        - id: <quest 3 id>
          title: <quest 3 title>
          description: |
            <3-4 sentences>
          giver_npc_id: <giver 3>
          obj_type: <kill|hack|retrieve>
          obj_target: <target 3>
          obj_room: <room 3>
          obj_count: <count>
          reward_credits: <credits>
          reward_xp_skill: hacking
          reward_xp_amount: <integer>

      rooms:
        - id: <giver_npc_id's room — patch in quest_id on their dialogue>
          name: placeholder
          desc: placeholder
          exits: {}
          npcs:
            - id: <giver npc 1 id>
              name: placeholder
              desc: placeholder
              hostile: false
              loot_table_id: <npc-id>-loot
              trades: []
              dialogue:
                - trigger: always
                  text: <updated always text that hints at the available job — brief, in-character>
                - trigger: always
                  text: <second dialogue line offering the quest>
                  quest_id: <quest 1 id>
        - id: <giver_npc_2's room>
          name: placeholder
          desc: placeholder
          exits: {}
          npcs:
            - id: <giver npc 2 id>
              name: placeholder
              desc: placeholder
              hostile: false
              loot_table_id: <npc-id>-loot
              trades: []
              dialogue:
                - trigger: always
                  text: <hints at job>
                - trigger: always
                  text: <offers quest>
                  quest_id: <quest 2 id>

  # ── 4. Haiku: validate YAML ────────────────────────────────────────────────
  - id: validate
    executor: claude
    model: claude-haiku-4-5-20251001
    no_clarify: true
    needs: [generate]
    prompt: |
      Do not ask clarifying questions. Do not add commentary.
      Output the following YAML verbatim. Correct ONLY clear YAML syntax errors.
      Do NOT change IDs, names, descriptions, or content.
      Do NOT add markdown fences. Raw YAML only.

      {{get "step.generate.data.value" .}}

  # ── 5. Inject into world.yaml ──────────────────────────────────────────────
  - id: inject
    executor: mud-worldgen-inject
    needs: [validate]
    prompt: "{{get \"step.validate.data.value\" .}}"
    vars:
      mud_world: "~/Projects/gl1tch-mud/worlds/{{.param.world | default \"cyberspace\"}}/world.yaml"

  # ── 6. Commit ──────────────────────────────────────────────────────────────
  - id: commit
    executor: shell
    needs: [inject]
    vars:
      cmd: |
        WORLD="{{.param.world}}"
        WORLD="${WORLD:-cyberspace}"
        cd ~/Projects/gl1tch-mud
        git add worlds/$WORLD/world.yaml
        git diff --cached --quiet && echo "nothing to commit" && exit 0
        git commit -m "chore(world): quest-generator $WORLD — $(date +%Y-%m-%d)"
        git push origin main
        # Sync world-state.yaml with current world content
        YQ_BIN=/opt/homebrew/bin/yq
        if command -v "$YQ_BIN" >/dev/null 2>&1; then
          WORLD_FILE=~/Projects/gl1tch-mud/worlds/$WORLD/world.yaml
          STATE_FILE=~/Projects/gl1tch-mud/worlds/$WORLD/world-state.yaml
          NEW_ROOM_IDS=$($YQ_BIN '[.rooms[].id]' "$WORLD_FILE" 2>/dev/null)
          NEW_ITEM_IDS=$($YQ_BIN '[.rooms[].items[]?.id // empty]' "$WORLD_FILE" 2>/dev/null)
          [ -n "$NEW_ROOM_IDS" ] && $YQ_BIN -i ".existing_room_ids = $NEW_ROOM_IDS" "$STATE_FILE" 2>/dev/null || true
          [ -n "$NEW_ITEM_IDS" ] && $YQ_BIN -i ".existing_item_ids = $NEW_ITEM_IDS" "$STATE_FILE" 2>/dev/null || true
          git add "$STATE_FILE" 2>/dev/null || true
        fi
