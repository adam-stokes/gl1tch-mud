name: mud-opus-worldbuild
version: "1"
description: "Opus reads world state and plans arcs; Sonnet generates rooms/NPCs/quests/lore; Haiku validates YAML before inject"
write_brain: false
game: false

steps:

  # ── 1. Extract world state brief for Opus ─────────────────────────────────
  - id: worldstate
    executor: shell
    vars:
      cmd: |
        WORLD="{{.param.world}}"
        WORLD="${WORLD:-cyberspace}"
        WORLD_FILE=~/Projects/gl1tch-mud/worlds/$WORLD/world.yaml
        STATE=~/Projects/gl1tch-mud/worlds/$WORLD/world-state.yaml
        BIBLE=~/Projects/gl1tch-mud/worlds/$WORLD/story-bible.md
        YQ=/opt/homebrew/bin/yq

        FACTIONS=$($YQ '.factions[] | .id + "|" + .name + "|" + .agenda' "$WORLD_FILE" 2>/dev/null)
        ROOMS=$($YQ '.rooms[] | .id + "|" + .name' "$WORLD_FILE" 2>/dev/null)
        QUESTS=$($YQ '.quests[] | .id + "|" + .title + "|" + .obj_type + ":" + .obj_target' "$WORLD_FILE" 2>/dev/null)
        ROOM_COUNT=$($YQ '.rooms | length' "$WORLD_FILE" 2>/dev/null)
        FACTION_COUNT=$($YQ '.factions | length' "$WORLD_FILE" 2>/dev/null)
        QUEST_COUNT=$($YQ '.quests | length' "$WORLD_FILE" 2>/dev/null)

        CHAPTER=$($YQ '.chapter' "$STATE" 2>/dev/null || echo "unknown")
        EXISTING_ROOMS=$($YQ '.existing_room_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        EXISTING_ITEMS=$($YQ '.existing_item_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        STORY=$(cat "$BIBLE" 2>/dev/null || echo "")

        printf "WORLD: %s\n" "$WORLD"
        printf "WORLD STATE BRIEF\n"
        printf "rooms: %s  factions: %s  quests: %s\n\n" "$ROOM_COUNT" "$FACTION_COUNT" "$QUEST_COUNT"
        printf "FACTIONS:\n%s\n\nROOMS:\n%s\n\nQUESTS:\n%s\n\n" "$FACTIONS" "$ROOMS" "$QUESTS"
        printf "STORY BIBLE:\n%s\n\nCHAPTER: %s\n\nEXISTING ROOM IDs (DO NOT DUPLICATE):\n%s\n\nEXISTING ITEM IDs (DO NOT DUPLICATE):\n%s\n\n" \
          "$STORY" "$CHAPTER" "$EXISTING_ROOMS" "$EXISTING_ITEMS"

  # ── 2. Opus: analyze world state, identify gaps, generate 3 arc briefs ────
  - id: arcs
    executor: claude
    model: claude-opus-4-6
    no_clarify: true
    needs: [worldstate]
    prompt: |
      You are the world architect of the MUD described in the story bible below.
      Follow the world's genre, tone, and lore exactly. PG-13.

      CURRENT WORLD STATE:
      {{get "step.worldstate.data.value" .}}

      TASK: Analyze the world state above. Identify:
      1. Which factions from CANONICAL FACTIONS are underserved (no active quests referencing them)
      2. Which rooms feel narratively isolated (no faction presence, no quests)
      3. What thematic gaps exist given the story bible's central conflict

      Then generate exactly 3 WORLD ARCS. Each arc is an ongoing storyline that spans
      2+ rooms and connects at least 2 factions. Format:

      ARC 1: <title>
      factions: <faction-id-1> + <faction-id-2>
      rooms_to_add: <2 room archetypes that advance this arc>
      quest_hooks: <2 quest ideas — include obj_type: kill/hack/retrieve/collect>
      lore_thread: <the central secret or revelation this arc builds toward>
      narrative_tone: <e.g. "mystery", "heist", "rescue", "political intrigue">

      ARC 2: <title>
      [same format]

      ARC 3: <title>
      [same format]

      Be specific. Reference existing faction IDs and room IDs from the world state.
      Use ONLY the factions listed in the story bible — do not invent new ones.
      These arcs will be handed to a content generator — they must be actionable.

  # ── 3. Sonnet: generate full world fragment from arc briefs ───────────────
  - id: generate
    executor: claude
    model: claude-sonnet-4-6
    no_clarify: true
    needs: [worldstate, arcs]
    prompt: |
      Do not ask clarifying questions. Generate immediately.

      You are a content generator for the MUD described in the story bible. You receive
      arc briefs from the world architect and generate the actual YAML world fragment.

      WORLD STATE CONTEXT:
      {{get "step.worldstate.data.value" .}}

      ARC BRIEFS FROM ARCHITECT:
      {{get "step.arcs.data.value" .}}

      IDEMPOTENCY — DO NOT CREATE:
      - Any room ID listed in "EXISTING ROOM IDs" above
      - Any item ID listed in "EXISTING ITEM IDs" above
      - Any faction not listed in the story bible

      Room exits must be empty ({}). New rooms are linked to the world by the room-link
      pipeline separately. Do not connect to specific existing rooms in exits.

      SIGNAL TIER SYSTEM (use signal_tier field on items):
        noise     — junk, barely functional
        signal    — standard gear (most items)
        ghost     — rare, hard to find
        zero-day  — one-of-a-kind, powerful
        flatline  — legendary (max 1 per pipeline run)

      Generate a YAML fragment that advances ALL THREE arcs.
      Return ONLY raw YAML. No markdown fences. No commentary.

      CRITICAL YAML RULES:
      - All text values must be plain text — no asterisks, no markdown emphasis
      - Multi-line content fields must use YAML block scalar (|)
      - Every id must be globally unique kebab-case
      - Each NPC must have exactly 2 dialogue entries (trigger: always + one conditional)
      - Conditional triggers: skill_gte:<skill>:<level> | has_item:<item-id> | rep_gte:<faction-id>:<level>

      rooms:
        - id: gen-<8 lowercase hex chars>
          name: <evocative 3-5 word name>
          desc: <2-3 vivid sentences matching the world's tone>
          exits: {}
          npcs:
            - id: <unique-kebab>
              name: <name appropriate to this world>
              desc: <1 sentence physical description>
              hostile: false
              loot_table_id: <npc-id>-loot
              trades:
                - id: trade-<npc-id>-1
                  offer_item_id: <existing item id>
                  offer_item_name: <matching name>
                  receive_item_id: <existing item id>
                  receive_item_name: <matching name>
                  rep_required: 0
                  faction: none
              dialogue:
                - trigger: always
                  text: <plain prose, 1-2 sentences, in-character>
                - trigger: <conditional trigger>
                  text: <reveals arc-relevant intel — faction names, locations, plot hooks>
          items:
            - id: <new unique kebab>
              name: <item name>
              desc: <1 sentence>
              signal_tier: signal
            - id: <new unique kebab>-record
              name: <In-world document name>
              desc: <1 sentence physical description>
              readable: true
              signal_tier: ghost
              content: |
                <5-7 lines of in-world text advancing the arc.
                Write as memo, field report, or faction communique.
                Reference specific faction IDs and arc lore. End with a plot hook.>
          systems: []
          locks: []

      loot_tables:
        - id: <npc-id>-loot
          entries:
            - item_id: <existing item id>
              name: <matching name>
              desc: <1 sentence>
              probability: 0.65
              count_min: 1
              count_max: 2
            - item_id: <existing item id>
              name: <matching name>
              desc: <1 sentence>
              probability: 0.35
              count_min: 1
              count_max: 1

      quests:
        - id: q-<unique-kebab>
          title: <quest title — tense, active>
          description: <2-3 sentences — what the job is, why it matters>
          giver_npc_id: <npc id from the rooms above>
          obj_type: <kill|hack|retrieve|collect>
          obj_target: <npc-id, system-id, or item-id>
          obj_room: <room-id where objective lives>
          obj_count: 1
          reward_credits: <integer 500-2000>
          reward_xp_skill: <skill name>
          reward_xp_amount: <integer 30-150>
          reward_item_id: <new unique item id>
          reward_item_name: <item name>
          reward_item_desc: <1 sentence>

  # ── 4. Haiku: validate YAML ────────────────────────────────────────────────
  - id: validate
    executor: claude
    model: claude-haiku-4-5-20251001
    no_clarify: true
    needs: [generate]
    prompt: |
      Do not ask clarifying questions. Do not add commentary.

      The following is a YAML world fragment. Output it VERBATIM. Correct ONLY clear
      YAML syntax errors (unclosed quotes, bad indentation, bare colons in unquoted strings).
      Do NOT change any IDs, names, descriptions, or content. Do NOT add or remove fields.
      Do NOT add markdown fences. Output raw YAML only.

      {{get "step.generate.data.value" .}}

  # ── 5. Inject into world.yaml ──────────────────────────────────────────────
  - id: inject
    executor: mud-worldgen-inject
    needs: [validate]
    prompt: "{{get \"step.validate.data.value\" .}}"
    vars:
      mud_world: "~/Projects/gl1tch-mud/worlds/{{.param.world | default \"cyberspace\"}}/world.yaml"

  # ── 6. Commit ──────────────────────────────────────────────────────────────
  - id: commit
    executor: shell
    needs: [inject]
    vars:
      cmd: |
        WORLD="{{.param.world}}"
        WORLD="${WORLD:-cyberspace}"
        cd ~/Projects/gl1tch-mud
        git add worlds/$WORLD/world.yaml
        git diff --cached --quiet && echo "nothing to commit" && exit 0
        git commit -m "chore(world): opus-worldbuild $WORLD — $(date +%Y-%m-%d)"
        git push origin main
        YQ=/opt/homebrew/bin/yq
        if command -v "$YQ" >/dev/null 2>&1; then
          WORLD_FILE=~/Projects/gl1tch-mud/worlds/$WORLD/world.yaml
          STATE_FILE=~/Projects/gl1tch-mud/worlds/$WORLD/world-state.yaml
          NEW_ROOM_IDS=$($YQ '[.rooms[].id]' "$WORLD_FILE" 2>/dev/null)
          NEW_ITEM_IDS=$($YQ '[.rooms[].items[]?.id // empty]' "$WORLD_FILE" 2>/dev/null)
          [ -n "$NEW_ROOM_IDS" ] && $YQ -i ".existing_room_ids = $NEW_ROOM_IDS" "$STATE_FILE" 2>/dev/null || true
          [ -n "$NEW_ITEM_IDS" ] && $YQ -i ".existing_item_ids = $NEW_ITEM_IDS" "$STATE_FILE" 2>/dev/null || true
          git add "$STATE_FILE" 2>/dev/null || true
        fi
