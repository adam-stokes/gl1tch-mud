name: mud-lock-inject
version: "1"
description: "Adds locked containers and restricted access points to existing rooms — rewards skill and key ownership"
write_brain: false
game: false

steps:

  # ── 1. Pick target room and lock type ─────────────────────────────────────
  - id: seed
    executor: shell
    vars:
      cmd: |
        ROOMS=("net-0" "net-1" "net-2" "net-3" "net-4" "net-5")
        LOCK_TYPES=(
          "vault panel: a flush-mounted armored door hiding cold-storage data"
          "biometric cage: neuro-encrypted container, opens only with a live scan"
          "dead drop cache: physically locked case bolted under a maintenance panel"
          "signal-isolated compartment: Faraday-shielded box, contents off the grid"
          "corporate evidence locker: seized tech, probably still transmitting"
          "emergency access hatch: leads somewhere that isn't on any official map"
        )
        RIDX=$(( $(date +%s) % 6 ))
        LIDX=$(( ($(date +%s) / 11) % 6 ))

        STATE=~/Projects/gl1tch-mud/worlds/cyberspace/world-state.yaml
        BIBLE=~/Projects/gl1tch-mud/worlds/cyberspace/story-bible.md
        CHAPTER=$(yq '.chapter' "$STATE" 2>/dev/null || echo "pre-broadcast")
        EXISTING_ROOMS=$(yq '.existing_room_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        EXISTING_ITEMS=$(yq '.existing_item_ids | join(", ")' "$STATE" 2>/dev/null || echo "")
        STORY=$(cat "$BIBLE" 2>/dev/null || echo "")

        echo "room: ${ROOMS[$RIDX]}, lock: ${LOCK_TYPES[$LIDX]}"
        printf "STORY BIBLE:\n%s\n\nCHAPTER: %s\n\nEXISTING ROOM IDs (DO NOT DUPLICATE):\n%s\n\nEXISTING ITEM IDs (DO NOT DUPLICATE):\n%s\n\n" "$STORY" "$CHAPTER" "$EXISTING_ROOMS" "$EXISTING_ITEMS"

  # ── 2a. Try codex (free tier) ─────────────────────────────────────────────
  - id: codex_try
    executor: shell
    needs: [seed]
    vars:
      cmd: |
        SEED="{{get "step.seed.data.value" .}}"
        TMPF=$(mktemp /tmp/mud_codex_XXXXXX.txt)
        TMPOUT=$(mktemp /tmp/mud_codex_out_XXXXXX.txt)
        cat > "$TMPF" << 'PROMPT_END'
        Do not ask clarifying questions. Generate immediately.

        You are a world builder for a cyberpunk text MUD.
        Gritty near-future, corporate dystopia, hacker underground. PG-13.

        Seed: SEED_PLACEHOLDER

        The seed gives a TARGET ROOM ID and a LOCK TYPE.
        Generate a rooms fragment containing ONLY the target room with 1-2 new locks.
        Also include any reward items the lock contains as readable items in the room's items list.
        Return ONLY raw YAML. No markdown fences. No commentary.

        CRITICAL YAML RULES:
        - All text values must be plain text — no asterisks, no markdown
        - Every id must be globally unique kebab-case
        - difficulty must be integer 1-5 (1 = trivial, 5 = elite)
        - keys is a list of item ids that can bypass the lock; use existing keycard id or a new unique id
        - exit must be a direction string (north/south/east/west) if the lock blocks a passage,
          OR omit exit and set it as a container lock

        EXISTING key/item IDs (safe to reference):
          keycard, decryption-key, ice-pick, packet-sniffer

        rooms:
          - id: <ROOM_ID from seed>
            name: placeholder
            desc: placeholder
            exits: {}
            npcs: []
            items:
              - id: <reward-item-unique-id>
                name: <reward item name>
                desc: <1 sentence>
                readable: true
                content: |
                  <3-5 lines of in-world text: a memo, access log, or data fragment.
                  Reference factions, codenames, or vulnerabilities. Reveal a plot hook.>
            systems: []
            locks:
              - id: <unique-kebab-id>
                exit: <direction OR omit>
                difficulty: <1-5>
                keys:
                  - <existing or new key item id>
                trigger: <one sentence describing what unlocking this reveals>
        PROMPT_END
        sed -i "s/SEED_PLACEHOLDER/$SEED/" "$TMPF"
        codex exec --full-auto -m codex-mini-latest - -o "$TMPOUT" < "$TMPF" 2>/dev/null
        EXIT=$?
        rm -f "$TMPF"
        if [ $EXIT -eq 0 ] && [ -s "$TMPOUT" ]; then
            cat "$TMPOUT"
        fi
        rm -f "$TMPOUT"

  # ── 2b. Fallback: Haiku ────────────────────────────────────────────────────
  - id: generate
    executor: claude
    no_clarify: true
    model: claude-haiku-4-5-20251001
    needs: [seed, codex_try]
    prompt: |
      Do not ask clarifying questions. Generate immediately.
      {{- $codex := get "step.codex_try.data.value" . }}
      {{- if $codex }}

      Codex already generated the following YAML. Output it VERBATIM — do not change a character.

      {{ $codex }}
      {{- else }}

      You are a world builder for a cyberpunk text MUD.
      Gritty near-future, corporate dystopia, hacker underground. PG-13.

      Seed: {{get "step.seed.data.value" .}}

      The seed gives a TARGET ROOM ID and a LOCK TYPE.
      Generate a rooms fragment containing ONLY the target room with 1-2 new locks.
      Also include any reward items the lock contains as readable items in the room's items list.
      Return ONLY raw YAML. No markdown fences. No commentary.

      CRITICAL YAML RULES:
      - All text values must be plain text — no asterisks, no markdown
      - Every id must be globally unique kebab-case
      - difficulty must be integer 1-5
      - keys is a list of item ids that can bypass the lock

      EXISTING key/item IDs (safe to reference):
        keycard, decryption-key, ice-pick, packet-sniffer

      CANONICAL FACTIONS (use ONLY these five — never create new factions):
        null-collective    — ZERO's crew, player faction
        axiom-security     — the corp that killed ZERO, hunting SIGNAL
        helix-division     — government intel, wants backdoors open
        ghost-protocol     — rival hired crew, can be flipped
        signal-collective  — neutral underground brokers

      IDEMPOTENCY — DO NOT CREATE:
      - Any room ID listed in "EXISTING ROOM IDs" above
      - Any item ID listed in "EXISTING ITEM IDs" above
      - Any faction not in the five listed above

      Every generated room must belong to one of four zones:
        Zone A (Axiom territory): connect to net-1
        Zone B (Helix territory): connect to net-2
        Zone C (Ghost Protocol territory): connect to net-5
        Zone D (ZERO/Null Collective territory): connect to net-4

      Every room must contain at least one ZERO/SIGNAL narrative hook
      (readable item, NPC dialogue, or system output connecting to the broadcast mission).

      rooms:
        - id: <ROOM_ID from seed>
          name: placeholder
          desc: placeholder
          exits: {}
          npcs: []
          items:
            - id: <reward-item-unique-id>
              name: <reward item name>
              desc: <1 sentence>
              readable: true
              content: |
                <3-5 lines of in-world text: memo, access log, or data fragment.
                Reference factions, codenames, or vulnerabilities. Reveal a plot hook.>
          systems: []
          locks:
            - id: <unique-kebab-id>
              exit: <direction OR omit>
              difficulty: <1-5>
              keys:
                - <existing or new key item id>
              trigger: <one sentence describing what unlocking this reveals>
      {{- end }}

  # ── 3. Inject ──────────────────────────────────────────────────────────────
  - id: inject
    executor: mud-worldgen-inject
    needs: [generate]
    prompt: "{{get \"step.generate.data.value\" .}}"

  # ── 4. Commit ──────────────────────────────────────────────────────────────
  - id: commit
    executor: shell
    needs: [inject]
    vars:
      cmd: |
        cd ~/Projects/gl1tch-mud
        git add worlds/cyberspace/world.yaml
        git diff --cached --quiet && echo "nothing to commit" && exit 0
        git commit -m "chore(world): lock-inject — $(date +%Y-%m-%d)"
        git push origin main
        # Sync world-state.yaml with current world content
        YQ_BIN=/opt/homebrew/bin/yq
        if command -v "$YQ_BIN" >/dev/null 2>&1; then
          WORLD_FILE=~/Projects/gl1tch-mud/worlds/cyberspace/world.yaml
          STATE_FILE=~/Projects/gl1tch-mud/worlds/cyberspace/world-state.yaml
          NEW_ROOM_IDS=$($YQ_BIN '[.rooms[].id]' "$WORLD_FILE" 2>/dev/null)
          NEW_ITEM_IDS=$($YQ_BIN '[.rooms[].items[]?.id // empty]' "$WORLD_FILE" 2>/dev/null)
          [ -n "$NEW_ROOM_IDS" ] && $YQ_BIN -i ".existing_room_ids = $NEW_ROOM_IDS" "$STATE_FILE" 2>/dev/null || true
          [ -n "$NEW_ITEM_IDS" ] && $YQ_BIN -i ".existing_item_ids = $NEW_ITEM_IDS" "$STATE_FILE" 2>/dev/null || true
          git add "$STATE_FILE" 2>/dev/null || true
        fi
