rooms:
  - id: net-0
    name: "The Gibson — Entry Node"
    desc: |
      Neon data streams pulse overhead. The air smells like ozone and burnt silicon.
      You are jacked in. Two corridors branch into darkness ahead.
    exits:
      north: net-1
      east: net-2
    systems:
      - id: entry-terminal
        security_level: 2
        reward_item: raw-silicon
        reward_text: "You crack the entry terminal and extract raw silicon from its buffer."
    npcs:
      - id: ice-daemon-0
        name: "Black ICE Daemon"
        hp: 30
        attack: 8
        desc: "A faceless enforcer. Its eyes are red LEDs."
        loot_table_id: ice-daemon-loot
        dialogue:
          - trigger: "always"
            text: "INTRUDER DETECTED. INITIATING COUNTERMEASURES."
    items: []
  - id: net-1
    name: "Archive Sector"
    desc: |
      Dusty memory cores line the walls, stacked floor to ceiling.
      Some are cracked. Data leaks out in faint blue wisps.
      A secure vault door leads north — it looks sealed tight.
    exits:
      south: net-0
      east: net-3
      north: net-4
    systems:
      - id: archive-console
        security_level: 4
        reward_item: copper-wire
        reward_text: "Deep in the archive you find a coil of copper wire — useful for crafting."
    locks:
      - id: vault-door
        exit: north
        difficulty: 5
        keys:
          - keycard
    npcs: []
    items:
      - id: root-key
        name: "Root Access Key"
        desc: "A crystalline token the size of a thumbnail. It hums with potential."
      - id: keycard
        name: "Security Keycard"
        desc: "An old keycard. Still valid, if the vault hasn't rotated credentials."
      - id: hazmat-suit
        name: "Hazmat Suit"
        desc: "An environmental protection suit repurposed for netrunner disguise ops."
        is_disguise: true
      - id: blueprint-ice-pick
        name: "ICE Pick Blueprint"
        desc: "A technical schematic for crafting tiered ICE Pick tools. Decode to unlock the recipe."
        is_blueprint: true
        unlocks_recipe: ice-pick
      - id: axiom-vendor-cache
        name: Encrypted Transmission
        desc: A truncated packet fragment bearing Axiom Security registry markers, timestamp metadata partially decrypted.
        readable: true
        content: |-
          [AX-PRIORITY-VECTOR] 2026-03-29 14:47Z
          Package integrity compromised across broker distribution tier. Authentication handshake layer inverted via poisoned vendor certificate injected 2026-03-27. Asset in Meridian infrastructure confirmed payload delivery and broker network contamination. All competing feeds now propagating corrupted data without detection window. Third-party supply chain fully mapped.
          Liquidate Meridian asset on 2026-04-06. Begin acquisition of their downstream clients while they hemorrhage credibility.
  - id: net-2
    name: "Trace Corridor"
    desc: |
      The walls here are translucent. You can see other programs moving through
      adjacent sectors — they haven't noticed you yet.
    exits:
      west: net-0
      south: net-5
    systems:
      - id: trace-router
        security_level: 6
        reward_item: data-chip
        reward_text: "You reroute the trace program's uplink and pocket a data chip."
        ice: active
    npcs:
      - id: trace-program-0
        name: "Trace Program"
        hp: 20
        attack: 5
        desc: "A sleek hunter-killer. Fast, relentless, dumb."
        loot_table_id: trace-program-loot
        trades:
          - id: trade-data
            wants:
              - id: data-chip
                count: 1
            offers:
              - id: encryption-key
                name: "Encryption Key"
                desc: "Bypasses standard auth layers."
                count: 1
            faction_req: "netrunners:3"
        dialogue:
          - trigger: "disguise:hazmat-suit"
            text: "Maintenance crew? Pass through. Don't touch anything."
          - trigger: "has_item:root-key"
            text: "That key... where did you get that? The Shepherd will be angry."
          - trigger: "always"
            text: "You shouldn't be in this sector. Turn around."
    items:
      - id: deck-patch
        name: "Neural Deck Patch"
        desc: "Restores 25 HP when used."
      - id: journalist-dead-drop
        name: Encrypted Handoff Log
        desc: A crumpled printout with cascade-corrected timestamps and fragment hashes, still warm from the burner.
        readable: true
        content: |-
          [2026-04-01 03:47 UTC] PHANTOM-COLLECTIVE TO INDEPENDENT COLLECTIVE
          Package contents verified. Classification seals from Axiom SecOps. Witness statements. Project codenames. Budget allocations for drone swarms targeting the Undercity. Three journalists on protective detail now. They go live in 48 hours. System is already scrubbing—expect legal harassment, infrastructure attacks. This exposure threads the needle between revolution and annihilation. Ghost-Protocol will not appreciate the ripple. Status: committed to the edge. No abort vector.
  - id: net-3
    name: "The Core"
    desc: |
      This is it. The heart of The Gibson. Data cascades from floor to ceiling
      in blinding columns of light. Something vast and old watches you from
      the centre of the room.
    exits:
      west: net-1
    npcs:
      - id: the-shepherd
        name: "The Shepherd"
        hp: 80
        attack: 15
        desc: "An AI so old it has forgotten what it was protecting."
        loot_table_id: shepherd-loot
        dialogue:
          - trigger: "rep_gte:netrunners:10"
            text: "You carry the mark of those who built me. I remember. Ask your question."
          - trigger: "has_item:decryption-key"
            text: "You have the key. You understand the old protocols. I will speak with you."
          - trigger: "always"
            text: "You do not belong here. Leave before I am forced to act."
    items:
      - id: master-key
        name: "Master Access Key"
        desc: "Root access to everything. Handle with care."
  - id: net-4
    name: "Deep Stack"
    desc: |
      Beyond the vault door lies a forgotten partition. Rows of crystalline data
      towers stretch upward into darkness. This place hasn't been accessed in years.
      Cobwebs of corrupted code drift between the towers like digital spiderwebs.
      Something valuable was stored here once.
    exits:
      south: net-1
    npcs: []
    items:
      - id: ancient-firmware
        name: "Ancient Firmware Package"
        desc: "A pre-war firmware image. Incredibly rare. Someone would pay handsomely for this."
      - id: exploit-axiom-auth
        name: "Axiom Auth Exploit"
        desc: "A zero-day exploit fragment targeting Axiom Security's authentication layer. Grants a bonus when hacking Axiom-defended systems."
        is_exploit: true
        targets_system: trace-router
        augment_bonus: 15
      - id: ceasefire-cipher
        name: Encrypted Transmission
        desc: A data burst still resolving through multiple anonymization layers, timestamp 2026-04-02 00:17 UTC
        readable: true
        content: |-
          Eyes only - ghost-protocol dispatch. Truce active as of 0000 UTC today. Null-collective pulls from
          eastern spine operations, we mothball substrate mining for the window. Axiom-security brokered the
          terms - they're tired of the economic bleed. Hostile intent remains mutual. Third-party observers
          already report phantom-collective probing the northern perimeter, looking for gaps. Escalation authority
          transfers to field command if ceasefire breaks. Prep contingency decryption cascades. Window closes
          2026-04-23 unless extended by consensus. Plan accordingly.
  - id: net-5
    name: "Black Ice Corridor"
    desc: |
      The corridor hums with predatory energy. Black ICE crystalline formations
      line the walls — passive, but aware. One wrong move and they activate.
      The air crackles with static discharge and the smell of burnt ozone.
      A faint blue glow pulses from deeper in the sector.
    exits:
      north: net-2
    npcs: []
    items:
      - id: ice-fragment
        name: "Black ICE Fragment"
        desc: "A shard of deactivated Black ICE. Still warm. Useful for advanced crafting."
      - id: response-dampener
        name: "Response Dampener"
        desc: "A hardware mod that attenuates ICE response signals. Fits into a compatible tool's mod slot."
        is_mod: true
      - id: null-collective-blackout-order
        name: Faction Communique
        desc: A corrupted data packet, most headers burned, partial timestamp visible at the edge of the dump.
        readable: true
        content: |-
          PRIORITY_CRITICAL | DISTRIBUTED_CAST
          TO: All Autonomous Nodes
          FROM: Ghost Protocol Authority
          DATE: 2026-03-29 04:17 UTC

          Axiom CI sweep flagged our net-5 safehouse infrastructure on the 28th. Three dead drops
          burned. Assume all terrestrial locations compromised. All nodes execute burn protocols
          immediately. Go full dark until secondary signal arrives. No contact. No traces.
          The collective survives only if we scatter.
  - id: gen-f7c2e419
    name: Decommissioned Mainframe Chamber
    desc: Floor-to-ceiling server racks hum with dying electronics, their indicator lights strobing through dust like dying fireflies. The air tastes of copper and ozone, recycled through vents that haven't been cleaned in years. Cables snake across the concrete, pooling in places where coolant has crystallized into rust-colored cakes.
    exits: {}
    npcs:
      - id: keeper-vault
        name: Keeper
        desc: A rail-thin figure in a faded maintenance uniform, one eye replaced with a dim amber optical implant that casts a sickly glow across weathered synthetic skin.
        hostile: false
        loot_table_id: keeper-vault-loot
        trades:
          - id: trade-keeper-vault-1
            offer_item_id: data-chip
            offer_item_name: Data Chip
            receive_item_id: decryption-key
            receive_item_name: Decryption Key
            rep_required: 0
            faction: none
          - id: trade-keeper-vault-2
            offer_item_id: raw-silicon
            offer_item_name: Raw Silicon
            receive_item_id: coolant-cartridge
            receive_item_name: Coolant Cartridge
            rep_required: 0
            faction: none
        dialogue:
          - trigger: always
            text: Corporate pulled the plug fifteen years ago. Now I just keep the lights from dying completely. You here for salvage or secrets?
            quest_id: q-kill-ice-daemon
          - trigger: skill_gte:hacking:2
            text: There's still locked data in node-seven, but the ice is thick. You'll need better tools than most runners carry.
            quest_id: q-retrieve-server-core
    items:
      - id: server-core
        name: Crystalline Server Core
        desc: A hand-sized lattice of fused silicon and rare earths, still faintly warm, pulsing with residual charge.
      - id: coolant-cartridge
        name: Coolant Cartridge
        desc: A pressurized metal cylinder leaking trace amounts of iridescent fluid that smells like synthetic flowers and death.
      - id: maintenance-log
        name: Water-Damaged Maintenance Log
        desc: A physical logbook with entries dating back to 2089, most pages unreadable but a few still legible.
        readable: true
        content: |
          Entry 2089-03-11 — Coolant loop three showing elevated pressure. Logged and ignored per directive.
          Entry 2089-07-22 — Axiom contractors on-site. Did not ask what they installed in node-seven.
          Entry 2091-01-04 — Power draw tripled overnight. No work order on record. Nobody answers the line anymore.
          Entry 2094-08-30 — I think whatever is in node-seven is still running. I don't check anymore.
      - id: neural-jack-mk1
        name: "Neural Jack Mk1"
        desc: "A first-generation cortical interface chip. Improves hacking reflex speed when installed."
        is_augment: true
        augment_skill: hacking
        augment_bonus: 5
      - id: ceasefire-accord-memo
        name: Intercepted Memo
        desc: Sealed datapad with encrypted key-exchange protocols and timestamp validation layers partially decrypted.
        readable: true
        content: |-
          AXIOM-SEC INTERNAL | CLASSIFICATION: IRON CURTAIN
          TO: Command Echelon | FROM: Negotiation Detail | DATE: 2026-03-28

          Temporary cessation agreement finalized with null-collective. Terms hold through 2026-04-15. Both parties standing down proxy operations in northeast corridor. Null-collective gains unrestricted access to three ice-farms in exchange for non-interference in our blacksite expansion.

          This window opens leverage against phantom-collective. They move now, we execute coordinated strike with null assets. If they hold position, we consolidate and prepare phase-two dominion plays.

          Do not communicate external. Ghost-protocol still unaware. Maintain cover operations.
    systems: []
    locks: []
  - id: gen-a7f2e4d9
    name: Cold Storage Archive Level Three
    desc: Rows of silent server racks stretch into darkness, their status LEDs long burned out. Fluorescent tubes flicker in a dying rhythm, casting sickly green light over dusty cable trays and pooled coolant. The air tastes like ozone and regret.
    exits: {}
    npcs:
      - id: keeper-moth
        name: Moth
        desc: A thin figure in a faded Hexagon Solutions windbreaker, fingers perpetually stained with thermal paste and old blood.
        hostile: false
        loot_table_id: keeper-moth-loot
        trades:
          - id: trade-keeper-moth-1
            offer_item_id: data-chip
            offer_item_name: Data Chip
            receive_item_id: hexagon-audit-log
            receive_item_name: Hexagon Audit Log Fragment
            rep_required: 0
            faction: none
        dialogue:
          - trigger: always
            text: These boxes still hum in their sleep. Phantom Collective hit the design vault three weeks ago. Hexagon doesn't know how deep it goes yet. They're sending hunters now.
          - trigger: skill_gte:hacking:2
            text: The real score is the firmware. Rust Prophets are already in the bootloader tables. They're patient. Financial system doesn't know what's coming in seventy-two hours.
    items:
      - id: hexagon-audit-log
        name: Hexagon Audit Log Fragment
        desc: A brittle printout, margins yellow with age, stamped CLASSIFIED.
      - id: phantom-raid-intercept
        name: Encrypted Transmission
        desc: A data slate with a decryption-key jacked into the port, still warm.
        readable: true
        content: |
          PHANTOM COLLECTIVE OPERATIONAL BRIEF 2026-03-28
          Target: Hexagon Solutions design vault, Arlington facility subsystem.
          Payload secured. Design docs routed through three ghost proxies.
          Exfil confirmed 2026-03-29 0400Z. Security response window closed by 0430Z.
          Corporate forensics still running circular audits. They don't know scope.
          Next phase: sell through Consensus-3 dark market. Zero-day window closes 2026-04-05.
      - id: journalist-handoff-cipher
        name: Encrypted Transmission
        desc: A data chip still warm from the transmission, marked with fresh scratch patterns where a hand gripped it tight.
        readable: true
        content: |-
          NETWORK TIMESTAMP: 2026-04-01 14:27 UTC
          Contact made the dead drop. Package contains three years of axiom-security audits, contractor lists, and facility maps. The journalist collective publishes in 48 hours and we vanish. Every corp in the city will be hunting both them and us. The leverage is mutual destruction at this point. Next phase: quantum-key derivatives to the underground press.
    systems: []
    locks: []
  - id: gen-b4e9f2a6
    name: The Blackout Refuge
    desc: A Faraday-lined chamber carved from concrete and reinforced lead. No signal penetrates here—no wireless, no drones, no ghosts in the machine. The silence is almost physical, a pressure against the skin. Copper mesh wraps the walls like a nervous system, and the air tastes of ozone and old fear.
    exits: {}
    npcs:
      - id: cipher-runner
        name: Cipher
        desc: Gaunt figure in a modified hazmat suit, fingers stained with solder flux, augmented eyes cycling through IR and RF spectrum overlays.
        hostile: false
        loot_table_id: cipher-runner-loot
        trades:
          - id: trade-cipher-runner-1
            offer_item_id: data-chip
            offer_item_name: Data Chip
            receive_item_id: packet-sniffer
            receive_item_name: Packet Sniffer
            rep_required: 0
            faction: none
        dialogue:
          - trigger: always
            text: Signals die in here. That's the whole point. If you need to stay invisible, you need dead air. What brings you to the void?
            quest_id: q-hack-archive-console
          - trigger: skill_gte:hacking:2
            text: Your heat signature is clean. You know how to move dark. Axiom Security's been flooding the district with RF scanners. The corps want everything tagged, tracked, triangulated. This chamber buys you time.
    items:
      - id: rf-dampener-core
        name: RF Dampener Core
        desc: A crystalline lattice matrix, still warm, engineered to absorb electromagnetic radiation across multiple frequencies.
      - id: axiom-comms-log
        name: Encrypted Transmission Log
        desc: A watermarked internal memo on polymer stock, heavily redacted, bearing the Axiom Security timestamp.
        readable: true
        content: |
          AXIOM SECURITY OPERATIONS — EYES ONLY
          2026-03-28 | SECTOR 7 BLANKING EVENT

          Hostile signal-jammer detected in commercial sector. Traces suggest Signal Collective fabrication. Recommend immediate RF mapping and physical breach protocol. Target location unknown. Encryption key required for asset recovery. Authorized personnel: Harker, Reeves, Morrison.

          Status: ONGOING. Escalate to Hunter Division.
      - id: shielded-cache
        name: Shielded Data Cache
        desc: A tungsten-lined box, no wireless interface, designed for long-term storage of sensitive materials in complete electromagnetic isolation.
