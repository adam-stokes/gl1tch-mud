    locks: []
  - id: gen-73f4e9ac
    name: Null Broadcast Chamber
    desc: The walls hum with a low electromagnetic frequency that makes your teeth ache. Faraday mesh lines every surface, copper strips grounding to industrial floor ports. No signal reaches here—no cellular, no broadcast, no stray RF. The air itself feels dead.
    exits: {}
    npcs:
      - id: signal-null
        name: Null
        desc: A gaunt figure in a grease-stained silver bodysuit, eyes hidden behind reflective HUD goggles, fingers twitching with habitual antenna-checking.
        hostile: false
        loot_table_id: signal-null-loot
        trades:
          - id: trade-signal-null-1
            offer_item_id: data-chip
            offer_item_name: Data Chip
            receive_item_id: response-dampener
            receive_item_name: Response Dampener
            rep_required: 0
            faction: none
        dialogue:
          - trigger: always
            text: You're here because the noise won't stop. I get it. They all get it. Nobody clears a chamber like this unless they're running from something loud.
          - trigger: skill_gte:hacking:2
            text: Your jack hums different. You've been inside the network. Listen—we're building a dead zone mesh, offline nodes nobody can touch. You could help. Or stay quiet. Either way, there's no signal here to betray you.
    items:
