        desc: Rusted ferrite ring studded with solder burns, deadens RF leakage at the junction.
      - id: jammed-freq-log
        name: Jammed Frequency Log
        desc: Watermarked printout, dense with marginalia and redaction.
        readable: true
        content: |
          SIGNAL DEAD OPERATIONAL LOG - FRAGMENT
          2026-03-28 0447hrs UTC

          Cascade resonator harvested from Axiom Security perimeter sweep. Frequency bleed detected
          on 2.4GHz band correlates to neural-surveillance drone traffic. Recommend RF detuning
          before integration into mainland cage network.

          Phantom Collective claims they own the north grid. They don't. We own the silence.
          - Static
    systems: []
    locks: []
