    locks: []
  - id: gen-4f2c8e7a
    name: Dead Zone Relay Station
    desc: "Corroded server towers hum with dying power cells in the darkness. A wall of \nemergency lights flickers in sync with an alarm that never quite stops. The air \ntastes like ozone and burnt polymer. Someone's scratched GTFO + coordinates into \nthe nearest console frame.\n"
