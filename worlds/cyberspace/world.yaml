    name: Panopticon Feed Farm
    desc: Servers hum in rows beneath flickering status panels that cycle through live surveillance feeds. Half the displays show obvious corruptions—ghostly double-exposures, sensor readings that spike impossibly high. The air smells like ozone and cooling fluid. On one wall, someone's scrawled FEED GOES DARK THURSDAY in white marker.
