    desc: Servers hum in discordant rhythm, their LED status lights pulsing out of sync. Walls lined with aluminum piping drip condensation onto mismatched cooling towers. A wall of darkened monitors shows fragmented network topology diagrams, each node labeled with cryptic callsigns.
