name: cyberspace
start_room: net-0
narrator_model: llama3.2
factions:
  - id: ghost-protocol
    name: "Ghost Protocol"
    desc: |
      Former intelligence operatives who burned their covers and went private.
      They move in the deep net's shadow markets, brokering zero-days and custom
      exploits to anyone solvent enough to afford them. Loyalty is a liability
      they stopped carrying years ago.
    agenda: "Profit from the information arms race by selling the highest bidder whatever they need to win."
    territory:
      - net-4
    allies: []
    enemies:
      - axiom-security
  - id: null-collective
    name: "Null Collective"
    desc: |
      An anarchist hacker cell with no central leadership and no fixed address.
      They believe data belongs to everyone and corporate information hoarding
      is a form of violence. They leak, they burn, they disappear. Romantics with
      root access.
    agenda: "Tear down the walls around corporate data and return the net to the commons."
    territory:
      - net-2
      - net-5
    allies: []
    enemies:
      - axiom-security
  - id: axiom-security
    name: "Axiom Security Division"
    desc: |
      The private enforcement arm of a conglomerate whose name changes with every
      quarterly filing. They run trace programs, maintain the Black ICE corridors,
      and hunt intrusions for hire. Their operators are indistinguishable from
      the infrastructure they protect — cold, efficient, and everywhere.
    agenda: "Locate, neutralise, and prosecute all unauthorized presence in client network space."
    territory:
      - net-0
      - net-1
      - net-3
    allies: []
    enemies:
      - ghost-protocol
      - null-collective
  - id: phantom-collective
    name: Phantom Collective
    desc: Silent operators who map legacy infrastructure before corporate audits can catch up. They move like ghosts through dormant systems, leaving ghost processes that phone home on random intervals. Their specialty is reconnaissance that stays hidden long enough to matter.
    agenda: Control the information architecture before the corporations realize what they've lost.
    territory: []
    allies: []
    enemies: []
  - id: signal-collective
    name: Signal Collective
    desc: A distributed network of hackers, pirates, and paranoid operators who architect blackout zones and trade in signal-dead tech. They see ubiquitous RF surveillance as an existential threat and build sanctuaries from it.
    agenda: Expand dead zones across the grid until corporate signal dominance collapses.
    territory: []
    allies: []
    enemies: []
  - id: phantom-syndicate
    name: PHANTOM Syndicate
    desc: A distributed collective of elite operators running mirror-network infrastructure against global settlement systems. They operate across multiple continents with polymorphic obfuscation signatures, leaving zero forensic footprint. Known for surgical precision against high-value targets and absolute operational security discipline.
    agenda: Maintain asymmetric financial leverage over G7 central banking systems through persistent, invisible SWIFT layer compromise.
    territory: []
    allies: []
    enemies: []
  - id: echo-syndicate
    name: ECHO SYNDICATE
    desc: Payment processor network specialists running microtransaction laundering through stolen banking infrastructure. Signature method is recursive DNS poisoning chains that fold attribution back on the source, leaving only decoys and fractured logs. They are efficient, disciplined, and increasingly hunted.
    agenda: Control the flow of untraceable capital through every payment layer they can compromise.
    territory: []
    allies: []
    enemies: []
  - id: blackwire-collective
    name: BLACKWIRE COLLECTIVE
    desc: Underground network of data thieves and surveillance hackers who've turned industrial espionage into art form. They operate across corporate networks in Southeast Asia and beyond, specializing in feed manipulation and data exfiltration. Their trademark is subtle—they make the panopticon see what they want it to see.
    agenda: Drain corporate secrets and sell them to the highest bidder while keeping their network invisible to every corporate hunter closing in.
    territory: []
    allies: []
    enemies: []
  - id: helix-division
    name: Helix Division
    desc: Deniable operations subsidiary of Obsidian Corp, staffed with corporate black-budget operatives and interrogation specialists. Grants them discretionary asset protection authority under statute, though their budget bleeds constantly chasing sophisticated threats. They move in the shadows between law enforcement and private enforcement.
    agenda: Contain PHANTOM COLLECTIVE supply-chain poisoning before it destabilizes client infrastructure and Obsidian Corp loses market dominance.
    territory: []
    allies: []
    enemies: []
crafting_recipes:
  - id: packet-sniffer
    name: "Packet Sniffer"
    ingredients:
      - {id: raw-silicon, count: 2}
      - {id: copper-wire, count: 1}
    output:
      id: packet-sniffer
      name: "Packet Sniffer"
      desc: "Intercepts and logs network traffic. Essential for any serious netrunner."
    skill_req: 0
  - id: ice-pick
    name: "ICE Pick"
    ingredients:
      - {id: carbon-blade, count: 1}
      - {id: copper-wire, count: 1}
    output:
      id: ice-pick
      name: "ICE Pick"
      desc: "A specialised tool for cracking Intrusion Countermeasure Electronics."
      mod_slots: 1
    skill_req: 1
    tier_thresholds: [0, 3, 6]
    tier_names: ["Mk1", "Mk2", "Mk3"]
  - id: decryption-key
    name: "Decryption Key"
    ingredients:
      - {id: packet-sniffer, count: 1}
      - {id: data-chip, count: 2}
    output:
      id: decryption-key
      name: "Decryption Key"
      desc: "Synthesised from captured traffic. Unlocks encrypted partitions."
    skill_req: 2
  - id: recipe-resonator-key
    name: Cascade Resonator
    ingredients:
      - {id: server-core, count: 1}
      - {id: copper-wire, count: 2}
    output:
      id: cascade-resonator
      name: Cascade Resonator
      desc: A jury-rigged device that amplifies weak electrical signals, useful for reading degraded data on damaged storage media.
    skill_req: 2
  - id: recipe-surveillance-lens
    name: Surveillance Lens
    ingredients:
      - {id: coolant-cartridge, count: 1}
      - {id: raw-silicon, count: 1}
      - {id: packet-sniffer, count: 1}
    output:
      id: surveillance-lens
      name: Surveillance Lens
      desc: "A heat-dissipated optical module fused from silicon and cooling fluid, capable of \nintercepting wireless transmissions across multiple frequencies. Grants passive \nobservation of network traffic within proximity.\n"
    skill_req: 2
  - id: recipe-cache-breaker
    name: Cache Breaker
    ingredients:
      - {id: coolant-cartridge, count: 1}
      - {id: raw-silicon, count: 2}
      - {id: decryption-key, count: 1}
    output:
      id: cache-breaker
      name: Cache Breaker
      desc: "A volatile silicon construct suspended in reactive coolant, engineered to corrupt \ndigital caches and purge surveillance logs. Temporary but effective for covering tracks \nin monitored systems.\n"
    skill_req: 2
  - id: recipe-ghost-cloak
    name: Ghost Cloak
    ingredients:
      - {id: rf-dampener-core, count: 1}
      - {id: copper-wire, count: 3}
      - {id: response-dampener, count: 1}
    output:
      id: ghost-cloak-mk1
      name: Ghost Cloak
      desc: A wearable electromagnetic veil that masks RF signatures for short bursts. Walk silent, disappear from corporate sensors. Lasts until you transmit.
    skill_req: 2
  - id: recipe-signal-harvester
    name: Signal Harvester Assembly
    ingredients:
      - {id: raw-silicon, count: 1}
      - {id: copper-wire, count: 2}
    output:
      id: signal-harvester
      name: Signal Harvester
      desc: |
        A delicate lattice of silicon traces and copper coils that siphons wireless data
        from nearby networks. Bleeds electromagnetic noise with every pulse.
    skill_req: 1
  - id: recipe-vault-breaker
    name: Vault Breaker Kit
    ingredients:
      - {id: copper-wire, count: 1}
      - {id: ice-pick, count: 1}
      - {id: decryption-key, count: 1}
    output:
      id: vault-breaker
      name: Vault Breaker
      desc: |
        A hybrid tool that combines brute-force puncture with cryptographic override.
        Extracts encrypted payloads from hardened server cores when force meets keys.
    skill_req: 2
  - id: recipe-isolation-layer
    name: Isolation Layer
    ingredients:
      - {id: cooling-manifold-breach, count: 1}
      - {id: copper-wire, count: 2}
    output:
      id: isolation-shim
      name: Network Isolation Shim
      desc: Blocks external signature detection on encrypted protocols.
    skill_req: 2
  - id: recipe-memory-restoration
    name: Memory Reconstruction
    ingredients:
      - {id: corrupted-memory-shard, count: 3}
      - {id: decryption-key, count: 1}
    output:
      id: restored-archive-log
      name: Restored Archive Log
      desc: Fragments of coherent memory, enough to understand what was lost here.
    skill_req: 3
  - id: recipe-panopticon-blind
    name: Panopticon Blind Spot Charge
    ingredients:
      - {id: corruption-kit-feed, count: 1}
      - {id: raw-silicon, count: 2}
    output:
      id: blind-spot-charge
      name: Blind Spot Charge
      desc: Weaponized feed corruption payload that creates localized surveillance gaps. HSO's algorithms will ignore anything in the radius.
    skill_req: 2
  - id: recipe-cipher-phantom
    name: Cipher Phantom
    ingredients:
      - {id: packet-sniffer, count: 1}
      - {id: decryption-key, count: 1}
      - {id: data-chip, count: 1}
    output:
      id: cipher-phantom
      name: Cipher Phantom
      desc: |
        A spectral network probe that decrypts live packet streams in real-time.
        Invisible to most ICE, it ghosts through corporate intranets harvesting unfiltered data.
    skill_req: 2
  - id: recipe-traffic-wraith
    name: Traffic Wraith
    ingredients:
      - {id: packet-sniffer, count: 1}
      - {id: decryption-key, count: 1}
      - {id: ice-pick, count: 1}
    output:
      id: traffic-wraith
      name: Traffic Wraith
      desc: |
        A vicious decryption daemon that tears through encrypted channels and peels back network masks.
        Leaves burning signatures in its wake, exposing hidden comm protocols and buried surveillance feeds.
    skill_req: 2
  - id: recipe-spoof-beacon
    name: Spoof Beacon
    ingredients:
      - {id: data-chip, count: 1}
      - {id: copper-wire, count: 2}
      - {id: packet-sniffer, count: 1}
    output:
      id: spoof-beacon
      name: Spoof Beacon
      desc: |
        A signal jammer rigged with false network identities. Broadcasts phantom data signatures
        across local networks to mask actual traffic sources and confuse ICE surveillance systems.
    skill_req: 2
  - id: recipe-mirror-protocol-adapter
    name: Mirror Protocol Adapter
    ingredients:
      - {id: data-chip, count: 1}
      - {id: copper-wire, count: 1}
      - {id: decryption-key, count: 1}
      - {id: response-dampener, count: 1}
    output:
      id: mirror-protocol-adapter
      name: Mirror Protocol Adapter
      desc: |
        A parasitic adapter that intercepts and mirrors encrypted responses back to their source,
        creating false echoes that fool authentication handshakes. Perfect for spoofing trusted systems.
    skill_req: 3
  - id: recipe-thermal-ghost-cloak
    name: Thermal Ghost Cloak
    ingredients:
      - {id: ice-fragment, count: 1}
      - {id: coolant-cartridge, count: 1}
      - {id: response-dampener, count: 1}
    output:
      id: thermal-ghost-cloak
      name: Thermal Ghost Cloak
      desc: |
        A jury-rigged heat-sink lattice that bleeds your thermal signature into ambient
        noise. Worn as an undersuit, it renders you invisible to thermal imaging for
        short bursts. The coolant cycles only last minutes before needing a full recharge.
    skill_req: 2
  - id: recipe-cascade-shadow-mask
    name: Cascade Shadow Mask
    ingredients:
      - {id: ice-fragment, count: 1}
      - {id: coolant-cartridge, count: 1}
      - {id: cascade-resonator, count: 1}
    output:
      id: cascade-shadow-mask
      name: Cascade Shadow Mask
      desc: |
        A feedback loop device that mirrors incoming sensor pings back at their source,
        scattering your location across phantom positions on the net. Effective against
        passive tracking until the resonance cascade destabilizes and burns out.
    skill_req: 2
  - id: recipe-packet-ghost-core
    name: Packet Ghost Device
    ingredients:
      - {id: raw-silicon, count: 1}
      - {id: copper-wire, count: 2}
      - {id: packet-sniffer, count: 1}
    output:
      id: packet-ghost-core
      name: Packet Ghost Core
      desc: |
        A substrate of mirrored copper traces threaded through raw silicon,
        designed to render network traffic invisible to passive surveillance nodes.
    skill_req: 2
  - id: recipe-trace-killer-module
    name: Trace Killer Module
    ingredients:
      - {id: raw-silicon, count: 1}
      - {id: copper-wire, count: 1}
      - {id: ice-pick, count: 1}
      - {id: response-dampener, count: 1}
    output:
      id: trace-killer-module
      name: Trace Killer Module
      desc: |
        A hybrid circuit board hardened with crystalline points that shatters
        digital footprints and dampens response signals before detection logs occur.
    skill_req: 2
  - id: recipe-thermal-ghost-rig
    name: Thermal Ghost Rig
    ingredients:
      - {id: ice-fragment, count: 1}
      - {id: coolant-cartridge, count: 1}
      - {id: response-dampener, count: 1}
    output:
      id: thermal-ghost-rig
      name: Thermal Ghost Rig
      desc: |
        A cryogenic masking harness that bleeds waste heat into null-space,
        rendering you invisible to thermal imaging and overhead surveillance.
    skill_req: 2
  - id: recipe-signal-scatter-device
    name: Signal Scatter Device
    ingredients:
      - {id: coolant-cartridge, count: 1}
      - {id: ice-fragment, count: 1}
      - {id: packet-sniffer, count: 1}
    output:
      id: signal-scatter-device
      name: Signal Scatter Device
      desc: |
        A pulse-jamming node that floods local mesh with decoy traffic,
        fragmenting your digital footprint across a thousand false vectors.
    skill_req: 2
