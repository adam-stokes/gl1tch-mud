        content: |
          AXIOM SECURITY SWEEP - 2026-03-28
          Sector 7 ghost-subnets marked for elimination.
          Null Collective claimed three nodes already. Ghost Protocol silent.
          All borrowed bandwidth flagged. Recommend cache purge within 72 hours.
          Dispatch Unit 4 standing by.
    systems: []
    locks: []
  - id: gen-7fa2e84c
    name: Faraday Grave
    desc: Walls layered in copper mesh and degraded RF shielding hum with residual static. A repurposed server cabinet serves as workbench, stripped of its guts. The air tastes like ozone and paranoia. No signal reaches here—no uplink, no trace, no escape.
    exits: {}
    npcs:
      - id: static-ghost
        name: Static Ghost
        desc: Lean frame wrapped in a grounding vest, eyes reflexive with the tic of old signal-sickness.
        hostile: false
        loot_table_id: static-ghost-loot
        trades:
          - id: trade-static-ghost-1
            offer_item_id: data-chip
            offer_item_name: Data Chip
            receive_item_id: faraday-mesh
            receive_item_name: Faraday Mesh
            rep_required: 0
            faction: none
        dialogue:
          - trigger: always
            text: They don't call me Ghost for the encryption. The cage eats signal. In here, you're invisible to everything that hunts by frequency.
          - trigger: skill_gte:hacking:2
            text: I've got cascade-resonator scrap in back. Enough to daisy-chain five cages. Corporate surveillance has a range limit when you fold the mesh right. Interested?
    items:
