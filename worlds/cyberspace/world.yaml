        desc: A cracked military-grade datapad displaying a partially decrypted operational memo.
        readable: true
        content: |
          TO: All PHANTOM Assets, Regional Ops
          FROM: Coord Callsign GHOST
          DATE: 2026-03-28
          RE: SWIFT Settlement Layer Persistence Status

          Distributed mirror protocol holding nominal. Polymorphic obfuscation signatures remain undetected across all G7 relay nodes. Nexus Security Ops has increased perimeter monitoring on Asia-Pacific infrastructure but has not discovered the injection points. Recommend rotation of payload delivery mechanisms within 72 hours. CIPHER freelance operation poses secondary risk vector if Eastern European contracts materialize.
    systems: []
    locks: []
  - id: gen-a7f2c891
    name: Corrupted Archive Node
    desc: Flickering server arrays line walls of this forgotten lab, their cooling systems dead. Banks of quantum-state storage units glow with phantom patterns—data ghosts recurring through circuits no one maintains. The air tastes like ozone and broken promises.
