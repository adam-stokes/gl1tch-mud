      - id: silenced-transmission
        name: Silenced Transmission Log
        desc: A hardcopy printout, signal-burned at the edges, text barely legible.
        readable: true
        content: |
          ORIGIN: Phantom Collective Safe House Seven
          DATE: 2089-03-28
          PRIORITY: Burn-on-sight

          Axiom Security has deployed new tracking algorithms in the main grid. Any unshielded transmission leaves a signature detectable across three city sectors. Silent Collective is offering asylum in shielded chambers—temporary, mobile, built into dead zones.

          Rendezvous: Null Broadcast Chamber. Recognition: hum frequency 7.3 kHz.
    systems: []
    locks: []
