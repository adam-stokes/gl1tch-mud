rooms:
  - id: wakeup-camp
    name: "WAKEUP CAMP"
    desc: |
      A ring of oil-drum fires under a sun-bleached billboard. Five drifters
      have made this their meeting spot ‚ÄĒ each one looking for a particular
      kind of recruit. Through the chain-link to the south, you can see the
      gates of Dusthaven.
    biome: settlement
    exits:
      south: dusthaven-0
    npcs:
      - id: old-cass
        name: "Old Cass"
        hp: 60
        attack: 10
        desc: "Retired gunslinger. Two fingers missing on the off hand. Drinks slow."
        dialogue:
          - trigger: "class:gunslinger"
            text: "You wear it on you, kid. The walk. Try 'inventory' ‚ÄĒ see what you came in with. Then 'look' around. Then 'examine' that crate at my feet. Then try 'fan' on the bottle. When you're ready, head south to the Gate. Marta's hiring."
          - trigger: always
            text: "*Old Cass tips his hat without looking up.*"
      - id: rust
        name: "Rust"
        hp: 50
        attack: 6
        desc: "One-eyed tinker hunched over a half-disassembled pipe rifle."
        dialogue:
          - trigger: "class:mechanic"
            text: "Hands first. Type 'inventory'. Then 'look'. Then 'examine' that crate ‚ÄĒ schematics inside. Try 'hotwire' on the dead radio. When you can do all four, head south to the Gate."
          - trigger: always
            text: "*Rust grunts and keeps tinkering. Not your conversation.*"
      - id: halftrack
        name: "Halftrack"
        hp: 45
        attack: 5
        desc: "One-legged trader with a satchel that bulges in suspicious places."
        dialogue:
          - trigger: "class:scavver"
            text: "Lesson one: 'inventory'. Lesson two: 'look'. Lesson three: 'examine' the crate ‚ÄĒ there's product in it. Lesson four: 'barter' with me. Then go talk to Marta at the Gate."
          - trigger: always
            text: "*Halftrack squints at you, decides you're not a customer, looks away.*"
      - id: doc-vega
        name: "Doc Vega"
        hp: 50
        attack: 5
        desc: "Vault-issue lab coat, sleeves rolled, scalpel tucked behind the ear."
        dialogue:
          - trigger: "class:medic"
            text: "Triage check. 'inventory'. 'look'. 'examine' the crate ‚ÄĒ chems inside. 'stim' yourself. Then south to the Gate."
          - trigger: always
            text: "*Doc Vega is sorting vials and doesn't look up.*"
      - id: mother-ash
        name: "Mother Ash"
        hp: 70
        attack: 7
        desc: "Ancient ghoul wrapped in tattered robes. Her eyes still see fine."
        dialogue:
          - trigger: "class:ghoul"
            text: "Old bones, child. 'inventory'. 'look'. 'examine' the crate. 'rad-feed' on the chunks. Then walk south. There's a glowing relic in the Collapsed Mall ‚ÄĒ pre-war, brittle, mine. Bring it to me when you can. The Settlers won't help you. We will."
            quest_id: ghoul-intro
          - trigger: always
            text: "*Mother Ash regards you with patient, ancient eyes. 'Not yet,' she murmurs. 'Not yet.'*"
    items:
      - id: tutorial-crate
        name: "Battered Crate"
        desc: "A scrap crate with a faded stencil. Looks like it's been kicked open and shut a hundred times."

  - id: dusthaven-0
    name: "The Gate"
    desc: |
      A rusted iron gate marks the entrance to Dusthaven. Makeshift watchtowers
      flank both sides, staffed by wary settlers clutching pipe rifles. Beyond
      the gate the settlement sprawls ‚ÄĒ corrugated iron, tarp roofs, cook-fire
      smoke. Faction recruiters work the crowd near the gate posts.
    biome: settlement
    exits:
      north: dusthaven-1
      east: dusthaven-3
      south: barrens-0
      west: dusthaven-7
    npcs:
      - id: settler-recruiter
        name: "Marta (Settlers)"
        hp: 50
        attack: 8
        desc: "A tough-looking woman with a Settlers armband. She sizes you up."
        dialogue:
          - trigger: "quest_not_active:settlers-intro"
            text: "You look like you can handle yourself. Prove it ‚ÄĒ bring me 3 scrap metal from the wasteland and I'll know you're useful to the Settlers."
            quest_id: settlers-intro
          - trigger: "quest_active:settlers-intro"
            text: "Still need that scrap metal. Head south through the gate and start scavenging."
          - trigger: "quest_active:settlers-defense"
            text: "Two Ash Raiders. That's the price for our gate. Get to it."
          - trigger: always
            text: "Settlers stand together. Stay sharp out there."
    items:
      - id: wasteland-notice
        name: "Crumpled Notice"
        desc: "DUSTHAVEN RULES: No shooting inside the gate. No stealing. Violators get the wall."
        readable: true
        content: "DUSTHAVEN RULES\n1. No shooting inside the gate.\n2. No stealing from settlers.\n3. Violators get thrown over the wall.\n\n‚ÄĒ The Settlers Council"

  - id: dusthaven-6
    name: "The Market"
    desc: |
      A loose ring of stalls under tarp awnings. Tradespeople hawk salvaged
      goods, ammo, food, and gossip. The smell of grilled meat fights with
      the smell of unwashed humanity. Caps change hands fast.
    biome: settlement
    exits:
      east: dusthaven-1
    npcs:
      - id: ammo-vendor
        name: "Crick the Ammo-Hand"
        hp: 40
        attack: 5
        desc: "A nervous man with too many fingers and not enough teeth. Sells brass."
        dialogue:
          - trigger: always
            text: "Brass for caps. Caps for brass. That's the trade. 'offers crick' for the menu."
        trades:
          - id: crick-ammo
            wants: [{id: caps, count: 8}]
            offers: [{id: ammo-casing, name: "Ammo Casing", desc: "Spent brass. Reloadable.", count: 5}]
          - id: crick-bulk-ammo
            wants: [{id: caps, count: 20}]
            offers: [{id: ammo-casing, name: "Ammo Casing", desc: "Spent brass. Reloadable.", count: 15}]
      - id: food-vendor
        name: "Tila the Cook"
        hp: 35
        attack: 4
        desc: "Sun-weathered woman with an iron grill and a permanent frown."
        dialogue:
          - trigger: always
            text: "Food's hot. Caps are cold. Trade fast."
        trades:
          - id: tila-trail
            wants: [{id: caps, count: 6}]
            offers: [{id: trail-rations, name: "Trail Rations", desc: "Heal 5 HP. Travel-tested.", count: 3}]
          - id: tila-canned
            wants: [{id: caps, count: 4}]
            offers: [{id: canned-food, name: "Canned Food", desc: "Pre-war canned goods. Heals 5 HP.", count: 2}]
      - id: junk-vendor
        name: "Gren the Junker"
        hp: 38
        attack: 6
        desc: "A burly man with a satchel full of suspicious tech."
        dialogue:
          - trigger: always
            text: "I take junk. I sell tools. Bring me scrap."
        trades:
          - id: gren-toolkit
            wants: [{id: scrap-metal, count: 10}, {id: caps, count: 15}]
            offers: [{id: toolkit, name: "Toolkit", desc: "Required for hotwiring advanced systems.", count: 1}]
          - id: gren-scrap-to-caps
            wants: [{id: scrap-metal, count: 5}]
            offers: [{id: caps, name: "Bottle Caps", desc: "Currency of the wastes.", count: 8}]
    items:
      - id: market-bulletin
        name: "Market Bulletin"
        desc: "A pinboard tacked with notices and bounties."
        readable: true
        content: "DUSTHAVEN MARKET BULLETIN\n- Doc Saw is buying clean cloth.\n- Bounty: Raider Chief in the Camp. 200 caps.\n- The Clinic needs medical runners.\n- Old gas station to the west ‚ÄĒ power's out, paying for a fix."

  - id: dusthaven-7
    name: "Settlers Hall"
    desc: |
      A long room with a council table at one end and a faded Settlers
      banner above it. Maps of the Barrens are pinned to every wall, marked
      with raider movements and patrol routes. The air smells of strong tea.
    biome: settlement
    exits:
      east: dusthaven-0
    npcs:
      - id: settler-elder
        name: "Elder Voss"
        hp: 65
        attack: 7
        desc: "Grey-bearded, leans on a cane. Eyes that have measured every horizon."
        dialogue:
          - trigger: "quest_not_active:hall-bounty"
            text: "Raider Chief's been hitting our supply runs. There's a bounty on his head ‚ÄĒ 200 caps. He's holed up in the camp east of the Burnt Overpass."
            quest_id: hall-bounty
          - trigger: always
            text: "We hold the gate. We hold the road. That's all we promise."
    items:
      - id: settlers-charter
        name: "Settlers Charter"
        desc: "The founding agreement of Dusthaven."
        readable: true
        content: "THE SETTLERS CHARTER\n1. We share water.\n2. We share walls.\n3. We share watch.\n4. We do not share with raiders."

  - id: dusthaven-1
    name: "The Scrapyard"
    desc: |
      Mountains of twisted metal and salvage fill the scrapyard. Workers sort
      through debris with practiced hands, pulling anything usable. A jury-rigged
      weapons bench stands near the south wall, scarred from years of use.
    biome: settlement
    workbench_types: [weapons]
    exits:
      south: dusthaven-0
      east: dusthaven-2
      west: dusthaven-6
    npcs:
      - id: scrapper-npc
        name: "Dex the Scrapper"
        hp: 40
        attack: 5
        desc: "A wiry man with grease-stained hands and a squint."
        dialogue:
          - trigger: always
            text: "Everything useful is buried somewhere in here. You just gotta dig."
        trades:
          - id: dex-trade-1
            wants: [{id: scrap-metal, count: 3}]
            offers: [{id: pipe-part, name: "Pipe Part", desc: "A bent iron pipe.", count: 2}]
    items: []
    resources:
      - id: scrapyard-pile
        type: mine
        tool_required: pickaxe
        respawn_actions: 6
        yields:
          - item_id: scrap-metal
            name: "Scrap Metal"
            desc: "Twisted salvage."
            probability: 0.9
            count_min: 1
            count_max: 3
          - item_id: pipe-part
            name: "Pipe Part"
            desc: "A bent iron pipe."
            tags: [component, gun-frame]
            quality: crude
            stat_mods: {}
            probability: 0.4
            count_min: 1
            count_max: 1

  - id: dusthaven-2
    name: "The Workshop"
    desc: |
      The workshop smells of solder and leather. Salvaged tools line every wall.
      Two benches dominate the center ‚ÄĒ one for armor work, one for structures.
      A hand-painted sign reads: BRING YOUR OWN MATERIALS.
    biome: settlement
    workbench_types: [armor, structures]
    exits:
      west: dusthaven-1
      north: dusthaven-4
    npcs:
      - id: gunsmith-npc
        name: "Roz the Gunsmith"
        hp: 40
        attack: 5
        desc: "A methodical woman who talks more to her tools than to people."
        dialogue:
          - trigger: always
            text: "Bring me the parts and I'll show you how it's done. Or figure it out yourself."
          - trigger: always
            text: "Armor's just as important as a gun. Remember that."
    items: []

  - id: dusthaven-3
    name: "The Saloon"
    # Note: east exit added to dusthaven-5 (Clinic)
    desc: |
      The Rusty Nail does a roaring trade in flat beer and hot gossip. Faded
      pre-war posters compete with hand-drawn maps on the walls. A bartender
      who's seen everything keeps the peace with a sawn-off under the bar.
      A back-corner table has been claimed by a wasteland medic with a chipped
      enamel sign reading "PATCH JOB ‚ÄĒ WE DON'T ASK QUESTIONS."
    biome: settlement
    exits:
      west: dusthaven-0
      east: dusthaven-5
    npcs:
      - id: bartender-npc
        name: "Hank the Bartender"
        hp: 60
        attack: 10
        desc: "Broad-shouldered, quiet. He hears everything."
        dialogue:
          - trigger: always
            text: "Ironclad's been pushing into the Crater. Raiders are pissed. Good for business."
          - trigger: always
            text: "Ghouls been seen near the Vault Door again. Ironclad won't like that."
        trades:
          - id: hank-trade-1
            wants: [{id: caps, count: 10}]
            offers: [{id: canned-food, name: "Canned Food", desc: "Pre-war canned goods. Heals 5 HP.", count: 2}]
          - id: hank-trade-2
            wants: [{id: caps, count: 5}]
            offers: [{id: whiskey-flask, name: "Whiskey Flask", desc: "Heal 10 HP.", count: 1}]
      - id: doc-saw
        name: "Doc Saw"
        hp: 50
        attack: 6
        desc: "A wiry medic with steady hands and tired eyes. Trade-tools laid out on the table: bandages, syringes, a single brown bottle of Buffout."
        dialogue:
          - trigger: always
            text: "Cash on the table, friend. I patch you up, you don't tell anyone where you got it. 'offers doc-saw' to see what I've got."
        trades:
          - id: doc-saw-bandages
            wants: [{id: caps, count: 5}]
            offers: [{id: bandage, name: "Bandage", desc: "A roll of clean cloth. Heals 10 HP.", count: 2}]
          - id: doc-saw-stim
            wants: [{id: caps, count: 15}]
            offers: [{id: stimpak, name: "Stimpak", desc: "A pre-war auto-injector. Heals 25 HP.", count: 1}]
          - id: doc-saw-stim-bulk
            wants: [{id: caps, count: 40}]
            offers: [{id: stimpak, name: "Stimpak", desc: "A pre-war auto-injector. Heals 25 HP.", count: 3}]
          - id: doc-saw-buffout
            wants: [{id: caps, count: 25}]
            offers: [{id: buffout, name: "Buffout", desc: "Pre-war combat stim. +20 max HP buff (when consumed).", count: 1}]
    items: []

  - id: dusthaven-4
    name: "The Base Plots"
    desc: |
      A cleared zone at the north edge of the settlement. Survey stakes mark
      out plots in the cracked earth. Your plot is here. Use 'build' to start
      construction, 'baseinfo' to check status, and 'stash'/'unstash' once
      you've built a Storage Locker.
    biome: settlement
    exits:
      south: dusthaven-2
    npcs: []
    items: []

  - id: dusthaven-5
    name: "The Clinic"
    desc: |
      A whitewashed shack with a hand-painted red cross on the door. Inside
      smells of bleach and old blood. Cots line one wall, all of them in use.
      A wall of pre-war pharmaceuticals ‚ÄĒ most empty bottles ‚ÄĒ looms behind
      the front desk. A grate in the back leads down to the maintenance level.
    biome: settlement
    exits:
      west: dusthaven-3
      down: sewers-0
    npcs:
      - id: nurse-aldis
        name: "Nurse Aldis"
        hp: 45
        attack: 4
        desc: "Sleeves rolled to the elbow, hair tied back. Hands that have stitched a thousand wounds."
        dialogue:
          - trigger: "quest_not_active:clinic-supplies"
            text: "We're out of clean cloth ‚ÄĒ bring me 5 cloth strips and I'll pay you in stims. People are dying for bandages here."
            quest_id: clinic-supplies
          - trigger: always
            text: "Rest if you need to. The cot in the corner's free."
        trades:
          - id: aldis-stim
            wants: [{id: caps, count: 12}]
            offers: [{id: stimpak, name: "Stimpak", desc: "Heals 25 HP.", count: 1}]
          - id: aldis-bandage-bulk
            wants: [{id: caps, count: 8}]
            offers: [{id: bandage, name: "Bandage", desc: "Heals 10 HP.", count: 3}]
          - id: aldis-radaway
            wants: [{id: caps, count: 18}]
            offers: [{id: radaway, name: "RadAway", desc: "Flushes radiation.", count: 1}]
      - id: doctor-meren
        name: "Doctor Meren"
        hp: 50
        attack: 5
        desc: "Older, calmer than Aldis. A stethoscope hangs around her neck ‚ÄĒ pre-war, working."
        dialogue:
          - trigger: always
            text: "Pay the desk for full healing. 30 caps and we'll patch you to full HP."
        trades:
          - id: meren-full-heal
            wants: [{id: caps, count: 30}]
            offers: [{id: clinic-receipt, name: "Clinic Receipt", desc: "Use this token at the cot to fully heal.", count: 1}]
    items:
      - id: clinic-poster
        name: "Clinic Poster"
        desc: "WASH HANDS. EAT FOOD. WEAR ARMOR. ‚ÄĒ Clinic Survival Tips"
        readable: true
        content: "DUSTHAVEN CLINIC ‚ÄĒ SURVIVAL TIPS\n1. Wash hands before eating.\n2. Boil water from the Crater.\n3. Wear armor in the ruins.\n4. Don't trust ghouls. (Doctor Meren disagrees.)"

  - id: barrens-0
    name: "The Ashfield"
    desc: |
      Flat, grey, dead. The ashfield stretches to the horizon in every direction,
      broken only by the skeletal remains of pre-war infrastructure. Dust devils
      spiral between rusted chassis. Raider scouts watch from a distance, deciding
      if you're worth the trouble.
    biome: wasteland
    exits:
      north: dusthaven-0
      east: barrens-1
      west: barrens-2
      south: barrens-5
    npcs:
      - id: raider-scout
        name: "Raider Scout"
        hp: 35
        attack: 9
        desc: "Lean and dangerous. The Ash Raiders brand is burned into their forearm."
        loot_table_id: raider-loot
    items: []
    resources:
      - id: ashfield-scavenge
        type: harvest
        respawn_actions: 4
        yields:
          - item_id: scrap-metal
            name: "Scrap Metal"
            desc: "Salvage from the ash."
            probability: 0.7
            count_min: 1
            count_max: 2
          - item_id: ammo-casing
            name: "Ammo Casing"
            desc: "Spent brass."
            probability: 0.5
            count_min: 1
            count_max: 3

  - id: barrens-1
    name: "Burnt Overpass"
    desc: |
      A collapsed highway overpass creates a natural chokepoint. The underpass
      is dark and smells of char. Someone has arranged old vehicle husks as cover.
      High-value scavengers come here ‚ÄĒ so do the people who prey on them.
    biome: wasteland
    exits:
      west: barrens-0
      east: ruins-0
      south: barrens-3
      north: barrens-4
    npcs:
      - id: raider-heavy
        name: "Ash Raider"
        hp: 55
        attack: 12
        desc: "Bigger than the scouts. Armored in scavenged plates."
        loot_table_id: wasteland-loot
    items: []
    resources:
      - id: overpass-salvage
        type: harvest
        respawn_actions: 5
        yields:
          - item_id: steel-barrel-crude
            name: "Steel Barrel"
            desc: "A rough steel pipe."
            tags: [component, gun-barrel]
            quality: crude
            stat_mods: {damage: 2, range: 1}
            probability: 0.4
            count_min: 1
            count_max: 1
          - item_id: copper-wire
            name: "Copper Wire"
            desc: "Salvaged wire."
            tags: [component, gun-receiver]
            quality: crude
            stat_mods: {damage: 1}
            probability: 0.5
            count_min: 1
            count_max: 1

  - id: barrens-2
    name: "The Crater"
    desc: |
      A bomb crater the size of a city block, ringed by radiation warning signs
      that nobody reads anymore. The walls of the crater are rich with exposed
      ore. Ironclad sentinels control the rim ‚ÄĒ they tax anyone who mines here.
      A faint trail leads west into open wasteland ‚ÄĒ the Howling Plains.
    biome: wasteland
    exits:
      east: barrens-0
      west: barrens-6
      north: flats-0
      southwest: plains-0
    npcs:
      - id: ironclad-sentry
        name: "Ironclad Sentry"
        hp: 65
        attack: 14
        desc: "Power armor patched with pre-war insignia. Eyes behind a visor."
        loot_table_id: wasteland-loot
        dialogue:
          - trigger: always
            text: "The Crater belongs to the Ironclad. You mine, you pay a ten percent tax. That's the deal."
    items: []
    resources:
      - id: crater-ore
        type: mine
        tool_required: pickaxe
        respawn_actions: 8
        yields:
          - item_id: scrap-iron
            name: "Scrap Iron"
            desc: "Raw iron ore from the crater walls."
            probability: 0.8
            count_min: 1
            count_max: 3
          - item_id: copper-wire
            name: "Copper Wire"
            desc: "Copper veins exposed by the blast."
            tags: [component, gun-receiver]
            quality: crude
            stat_mods: {damage: 1}
            probability: 0.5
            count_min: 1
            count_max: 2
          - item_id: radiation-crystal
            name: "Radiation Crystal"
            desc: "A glowing mineral from the blast zone. Rare. Valuable."
            probability: 0.08
            count_min: 1
            count_max: 1

  - id: barrens-3
    name: "Combat Zone Entrance"
    desc: |
      A weathered sign above a reinforced door reads: COMBAT ZONE ‚ÄĒ ENTER AT
      OWN RISK. The sounds of distant gunfire echo from somewhere inside.
      Spectators and gamblers cluster near the entrance, exchanging caps.
      Type 'arena' to enter a Team Deathmatch. Kill all five raiders to win.
    biome: wasteland
    exits:
      north: barrens-1
    npcs: []
    items:
      - id: combat-zone-flyer
        name: "Combat Zone Flyer"
        desc: "COMBAT ZONE: Team deathmatch. Caps paid to survivors."
        readable: true
        content: "COMBAT ZONE ‚ÄĒ TDM\nKill all five Ash Raiders before they kill you.\nReward: 200 caps. Type 'arena' to begin."

  - id: barrens-4
    name: "Raider Camp"
    desc: |
      A ring of beat-up trucks circled around a bonfire. Severed signposts
      and salvaged tarps form lean-tos. The smell of woodsmoke and rotting
      meat. The Raider Chief holds court at the fire, surrounded by his
      lieutenants. They see you the moment you enter. A rough trail leads
      north along a road of bones.
    biome: wasteland
    exits:
      south: barrens-1
      north: raider-0
    npcs:
      - id: raider-chief
        name: "Karth the Raider Chief"
        hp: 120
        attack: 18
        desc: "Bigger than any raider you've seen. Half his face is scar tissue. He carries a rebar club like it's a toy."
        loot_table_id: raider-chief-loot
        dialogue:
          - trigger: always
            text: "Another bounty hunter. The Settlers must be paying well this week. *spits*"
      - id: raider-lieutenant
        name: "Raider Lieutenant"
        hp: 70
        attack: 14
        desc: "Karth's enforcer. War paint and a sawn-off."
        loot_table_id: raider-loot
    items: []

  - id: barrens-5
    name: "Derelict Caravan"
    desc: |
      A pre-war supply caravan, run aground in the dust years ago. The cab
      is collapsed but the trailer is intact. Someone has been picking it
      over ‚ÄĒ but they didn't get the locked footlocker bolted to the floor.
      A nervous trader and his guard pace nearby, eyeing you.
    biome: wasteland
    exits:
      north: barrens-0
    locks:
      - id: caravan-footlocker
        exit: locker
        difficulty: 3
        keys: [caravan-key]
    npcs:
      - id: caravan-trader
        name: "Skel the Wandering Trader"
        hp: 35
        attack: 4
        desc: "Wiry, twitchy, eyes that calculate every angle. Carries a sawn-off and a bag of bottle caps."
        dialogue:
          - trigger: always
            text: "I don't sell to strangers. *Skel's hand drifts toward his shotgun.*"
        trades:
          - id: skel-stim-pack
            wants: [{id: caps, count: 35}]
            offers: [{id: stimpak, name: "Stimpak", desc: "Heals 25 HP.", count: 2}]
          - id: skel-mystery
            wants: [{id: caps, count: 50}]
            offers: [{id: mystery-bundle, name: "Mystery Bundle", desc: "Skel won't say what's inside. Worth a roll.", count: 1}]
      - id: caravan-guard
        name: "Caravan Guard"
        hp: 60
        attack: 13
        desc: "A hired gun. Cheap leather armor, expensive rifle."
        loot_table_id: wasteland-loot
    items:
      - id: caravan-manifest
        name: "Caravan Manifest"
        desc: "A waybill listing the caravan's original cargo. Most of it is missing."
        readable: true
        content: "CARAVAN MANIFEST ‚ÄĒ pre-war supply run\n- 12x Stimpak\n- 6x RadAway\n- 1x Pre-War Circuitry\n- 1x Footlocker key (in driver's pocket)"

  - id: barrens-6
    name: "Old Gas Station"
    desc: |
      A pre-war filling station, the awning collapsed, pumps rusted in place.
      A neon sign ‚ÄĒ long dead ‚ÄĒ still reads VAULT-TEC FUEL. The pumps look
      hotwirable. Wires dangle from the breaker box. Useful tech if you can
      coax it back to life.
    biome: wasteland
    exits:
      east: barrens-2
    locks:
      - id: gas-pump-power
        exit: pump
        difficulty: 2
        keys: [gas-station-fuse]
    npcs:
      - id: station-mechanic
        name: "Bo the Wrench"
        hp: 50
        attack: 6
        desc: "A grease-stained wanderer trying to get the station running. Wears a faded VAULT-TEC FUEL hat."
        dialogue:
          - trigger: "quest_not_active:gas-station-power"
            text: "I can't get the breaker to throw. If you can hotwire the panel, I'll cut you in. 75 caps and a toolkit's worth of parts."
            quest_id: gas-station-power
          - trigger: always
            text: "You hotwire that panel and we're both rich. Try the breaker, friend."
    items:
      - id: gas-station-breaker
        name: "Breaker Panel"
        desc: "A pre-war power panel, casing cracked. Wires inviting a crossover."
      - id: gas-station-fuse
        name: "Spare Fuse"
        desc: "A spare ceramic fuse. Bo dropped it under the pump."
    resources:
      - id: gas-station-salvage
        type: harvest
        respawn_actions: 6
        yields:
          - item_id: copper-wire
            name: "Copper Wire"
            desc: "Salvaged from the pumps."
            tags: [component, gun-receiver]
            quality: crude
            stat_mods: {damage: 1}
            probability: 0.7
            count_min: 1
            count_max: 2
          - item_id: spare-battery
            name: "Spare Battery"
            desc: "Pre-war D-cell. Still holds a charge."
            probability: 0.3
            count_min: 1
            count_max: 1

  - id: ruins-0
    name: "Collapsed Mall"
    desc: |
      The skeleton of a pre-war shopping mall. Glass skylights long since fallen.
      Boutique signs hang at odd angles, brands no one remembers. The floors above
      have pancaked into each other, creating a labyrinth of debris chambers.
      Heavy enemies hunt in the dark. The loot is worth the risk.
    biome: ruins
    exits:
      west: barrens-1
      north: ruins-1
      east: ruins-3
    npcs:
      - id: feral-ghoul
        name: "Feral Ghoul"
        hp: 45
        attack: 11
        desc: "A radiation-warped former human. Barely aware. Very hostile."
        loot_table_id: ruins-loot
      - id: ironclad-patrol
        name: "Ironclad Patrol"
        hp: 70
        attack: 15
        desc: "Two soldiers moving in formation. Ironclad patches on their armor."
        loot_table_id: ruins-loot
    items:
      - id: glowing-relic
        name: "Glowing Relic"
        desc: "A pre-war ceramic shard, faintly luminescent, warm to the touch."
    resources:
      - id: mall-salvage
        type: harvest
        respawn_actions: 8
        yields:
          - item_id: polymer-sheet
            name: "Polymer Sheet"
            desc: "Pre-war polymer panel."
            tags: [component, armor-base]
            quality: standard
            stat_mods: {damage_resist: 3}
            probability: 0.3
            count_min: 1
            count_max: 1
          - item_id: pre-war-circuitry
            name: "Pre-War Circuitry"
            desc: "Complex pre-war circuits."
            tags: [component, gun-receiver]
            quality: refined
            stat_mods: {damage: 4, accuracy: 2}
            probability: 0.15
            count_min: 1
            count_max: 1

  - id: ruins-1
    name: "The Vault Door"
    desc: |
      A massive vault door, pre-war manufacture, set into the bedrock beneath
      the mall. The Ironclad have set up camp outside it. The Ghoul Collective
      watches from the shadows of collapsed storefronts. Neither side has gotten
      the door open yet. Three key fragments are required.
    biome: ruins
    exits:
      south: ruins-0
      north: ruins-2
    locks:
      - id: vault-lock
        exit: north
        difficulty: 0
        keys: [vault-key-fragment]
    npcs:
      - id: ironclad-commander
        name: "Ironclad Commander"
        hp: 90
        attack: 18
        desc: "Combat-scarred and impatient. Three chevrons on their sleeve."
        dialogue:
          - trigger: always
            text: "The Vault belongs to the Ironclad. Bring the key fragments or get out of my sight."
      - id: ghoul-elder
        name: "Elder Maren (Ghoul Collective)"
        hp: 60
        attack: 8
        desc: "Ancient, grey-skinned, calm. She radiates a quiet authority."
        dialogue:
          - trigger: always
            text: "The Vault is our home. Whatever the Ironclad thinks it holds ‚ÄĒ they are wrong."
          - trigger: always
            text: "If you want to help us, find the key fragments before they do."
    items: []

  - id: ruins-2
    name: "Vault Interior"
    desc: |
      The Vault opens onto a long corridor lit by failing fluorescent tubes.
      Pre-war murals line the walls ‚ÄĒ families, sunshine, promises never kept.
      Deep in the Vault, the Ghoul Collective has built a home. A reinforced
      bulkhead at the far end leads down to deeper sub-levels nobody has
      reached in living memory.
    biome: ruins
    exits:
      south: ruins-1
      down: vault-0
    npcs:
      - id: vault-dweller
        name: "Vault Dweller"
        hp: 40
        attack: 6
        desc: "A young ghoul-kin, born here. They've never seen the surface."
        dialogue:
          - trigger: always
            text: "Please. This is all we have. Don't let them take it."
    items:
      - id: pre-war-cache
        name: "Pre-War Cache"
        desc: "A locked container holding pre-war weapons and gear."
        is_container: true
        capacity: 5

  - id: ruins-3
    name: "Tower Defense Grid"
    desc: |
      A cleared zone in the ruins, marked with painted grid lines and numbered
      positions. Old terminal screens along the walls display wave readouts.
      Your base turrets from dusthaven will fire at the start of each wave.
      Type 'arena' to start a Tower Defense match. Survive three waves to win.
    biome: ruins
    exits:
      west: ruins-0
    npcs: []
    items:
      - id: tower-defense-manual
        name: "Tower Defense Manual"
        desc: "Place your defenses. Survive the waves. Split the loot."
        readable: true
        content: "TOWER DEFENSE\nSurvive 3 waves of Ash Raiders.\nYour dusthaven-4 base turrets auto-fire each wave.\nReward: 300 caps + Pre-War Circuitry. Type 'arena' to begin."

  - id: flats-0
    name: "The Salt Flats"
    desc: |
      A blinding white expanse of cracked salt stretching to a wavering horizon.
      The wind here is constant and dry. Pre-war wreckage juts from the salt
      like the bones of some forgotten leviathan. To the north, the dark spire
      of an Ironclad outpost. To the east, the skeletal silhouette of a
      chemical plant.
    biome: wasteland
    exits:
      south: barrens-2
      north: flats-1
      east: flats-2
    npcs:
      - id: salt-prospector
        name: "Old Mira the Prospector"
        hp: 40
        attack: 5
        desc: "Sun-blackened skin, white hair, eyes like a hawk. She's been walking the flats for thirty years."
        dialogue:
          - trigger: always
            text: "The flats look empty. They aren't. Watch your step out east ‚ÄĒ chemical fog can drop you fast. And the Ironclad north don't take kindly to drifters."
        trades:
          - id: mira-water
            wants: [{id: caps, count: 6}]
            offers: [{id: clean-water, name: "Clean Water", desc: "Filtered rain water. Heals 8 HP.", count: 2}]
    items: []
    resources:
      - id: salt-harvest
        type: harvest
        respawn_actions: 5
        yields:
          - item_id: salt-crystal
            name: "Salt Crystal"
            desc: "A dense crystal of pure salt. Trades well in town."
            probability: 0.8
            count_min: 1
            count_max: 3

  - id: flats-1
    name: "Ironclad Outpost"
    desc: |
      A pre-war military checkpoint, retrofitted with corrugated walls and
      a tower-mounted heavy gun. Ironclad sentries patrol the perimeter.
      A quartermaster runs a small commissary inside. Ironclad-aligned
      runners are welcome; everyone else gets a long, hostile look.
    biome: wasteland
    exits:
      south: flats-0
    npcs:
      - id: ironclad-quartermaster
        name: "Quartermaster Cole"
        hp: 70
        attack: 12
        desc: "Square jaw, square shoulders, square uniform. The kind of soldier who ironed his fatigues this morning."
        dialogue:
          - trigger: "rep_gte:ironclad:0"
            text: "State your purpose. The commissary is open if you've got caps. We don't barter with scavengers."
          - trigger: always
            text: "You're not on the roster. Walk away."
        trades:
          - id: cole-armor-plate
            wants: [{id: caps, count: 40}]
            offers: [{id: armor-plate-standard, name: "Armor Plate", desc: "Pre-war pressed steel.", count: 1}]
          - id: cole-stimpak-mil
            wants: [{id: caps, count: 20}]
            offers: [{id: stimpak, name: "Stimpak", desc: "Military-grade. Heals 25 HP.", count: 1}]
          - id: cole-ammo
            wants: [{id: caps, count: 25}]
            offers: [{id: ammo-casing, name: "Mil-Spec Ammo", desc: "Better than scrapper brass.", count: 20}]
      - id: ironclad-recruiter
        name: "Sergeant Vex"
        hp: 75
        attack: 14
        desc: "A scarred recruiter looking for runners willing to do dirty work. Ironclad eagle on her chest."
        dialogue:
          - trigger: "quest_not_active:ironclad-trial"
            text: "We need someone unaffiliated for a delicate job. Bring me 3 vault-key-fragments from the ruins. We pay in stimpaks and rep."
            quest_id: ironclad-trial
          - trigger: always
            text: "Talk to the Quartermaster if you've got caps. Otherwise, get clear of the gate."
    items:
      - id: ironclad-recruitment-poster
        name: "Ironclad Recruitment Poster"
        desc: "STAND TALL. STAND IRONCLAD. ‚ÄĒ Recruitment standing always open."
        readable: true
        content: "THE IRONCLAD\nWe were the army before the bombs.\nWe will be the order after them.\nJoin us. Carry our colors. Reclaim what was lost."

  # ‚ĒÄ‚ĒÄ‚ĒÄ DUSTHAVEN SEWERS (3 rooms) ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ

  - id: sewers-0
    name: "The Drain"
    desc: |
      A pre-war drainage shaft, half-flooded with brackish water. The grate
      from the Clinic rattles overhead. Old service ladders descend further
      into the dark. Something splashes in the corner ‚ÄĒ could be a rat, could
      be worse.
    biome: ruins
    exits:
      up: dusthaven-5
      north: sewers-1
    npcs:
      - id: sewer-rat
        name: "Glowmaw Rat"
        hp: 25
        attack: 7
        desc: "A radiation-bloated rat the size of a dog. Its teeth glow faintly green."
        loot_table_id: sewer-loot
    items:
      - id: sewer-pipe-fragment
        name: "Pipe Fragment"
        desc: "A length of brass pipe, still threaded."
    resources:
      - id: drain-salvage
        type: harvest
        respawn_actions: 5
        yields:
          - item_id: copper-wire
            name: "Copper Wire"
            desc: "Pulled from the drain conduits."
            tags: [component, gun-receiver]
            quality: crude
            stat_mods: {damage: 1}
            probability: 0.6
            count_min: 1
            count_max: 2

  - id: sewers-1
    name: "Maintenance Tunnels"
    desc: |
      Cramped concrete tunnels lined with cable trays and burst pipes.
      Graffiti from a hundred squatters covers the walls ‚ÄĒ most of it
      warnings. The air is thick with the smell of mildew and rust.
      A heavy door to the east is marked RESERVOIR ‚ÄĒ KEEP CLOSED.
    biome: ruins
    exits:
      south: sewers-0
      east: sewers-2
    npcs:
      - id: sewer-scavenger
        name: "Mole the Scavenger"
        hp: 40
        attack: 6
        desc: "A scavenger who has lived under Dusthaven for years. Pale skin, headlamp, distrustful eyes."
        dialogue:
          - trigger: "quest_not_active:reservoir-clear"
            text: "Something nests in the reservoir. Killed two of my friends. Clear it out and I'll pay you."
            quest_id: reservoir-clear
          - trigger: always
            text: "Mind the puddles. Half of them aren't water."
        trades:
          - id: mole-trade-1
            wants: [{id: sewer-pipe-fragment, count: 3}]
            offers: [{id: caps, name: "Bottle Caps", desc: "Mole's stash.", count: 20}]
    items: []

  - id: sewers-2
    name: "The Reservoir"
    desc: |
      A vast underground cistern, half full of dark water. Pre-war pumps
      hang silent from the ceiling. The water is cleaner than anything
      on the surface ‚ÄĒ clean enough to fight over. Something massive
      moves beneath the surface.
    biome: ruins
    exits:
      west: sewers-1
    npcs:
      - id: reservoir-horror
        name: "Reservoir Horror"
        hp: 110
        attack: 17
        desc: "A mass of mutated flesh and grasping limbs that lives beneath the water. The Sewer Scavengers tell stories about it."
        loot_table_id: sewer-boss-loot
    items: []
    resources:
      - id: clean-water-source
        type: harvest
        respawn_actions: 6
        yields:
          - item_id: clean-water
            name: "Clean Water"
            desc: "Filtered through pre-war pumps. Heals 8 HP."
            probability: 0.9
            count_min: 1
            count_max: 2

  # ‚ĒÄ‚ĒÄ‚ĒÄ ASH RAIDER STRONGHOLD (4 rooms) ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ

  - id: raider-0
    name: "The Bone Road"
    desc: |
      A dirt track marked at intervals by skeletons lashed to wooden poles ‚ÄĒ
      both human and otherwise. The Ash Raiders' way of saying "this far,
      no further." A guard tower looms to the north, and beyond it, the
      sounds of a working camp.
    biome: wasteland
    exits:
      south: barrens-4
      north: raider-1
    npcs:
      - id: raider-watchman
        name: "Raider Watchman"
        hp: 60
        attack: 13
        desc: "Perched on a watchtower with a hunting rifle and a brass spyglass."
        loot_table_id: raider-loot
    items:
      - id: bone-marker
        name: "Bone Marker"
        desc: "A wooden post with a skull lashed to it. The skull has names carved into the bone."
        readable: true
        content: "Names carved into the bone:\n  KARTH ‚ÄĒ chief\n  RUNE ‚ÄĒ pit master\n  THARN ‚ÄĒ warlord\n  ASH ‚ÄĒ the first"

  - id: raider-1
    name: "The Pit"
    desc: |
      A rough fighting pit dug into the earth, surrounded by tiered seating
      made of crates and old tires. Raiders cheer for whatever is bleeding
      in the bottom. The pit master, Rune, takes bets at the rim.
    biome: wasteland
    exits:
      south: raider-0
      north: raider-2
      east: raider-3
    npcs:
      - id: raider-pit-master
        name: "Rune the Pit Master"
        hp: 80
        attack: 14
        desc: "A bare-chested raider with a tally of kill marks tattooed across his chest."
        loot_table_id: raider-loot
        dialogue:
          - trigger: "quest_not_active:pit-champion"
            text: "Want to fight in the pit? Three rounds. You win, you walk out with caps. You lose, we feed your bones to the dogs."
            quest_id: pit-champion
          - trigger: always
            text: "Bets close in five minutes. Place your caps."
        trades:
          - id: rune-bet
            wants: [{id: caps, count: 10}]
            offers: [{id: pit-token, name: "Pit Token", desc: "A bone disc carved with the pit symbol. Wager-marker.", count: 1}]
    items: []

  - id: raider-2
    name: "Warlord's Throne"
    desc: |
      A tarpaulin-covered platform built atop the largest truck wreck in
      the camp. Warlord Tharn sits on a throne assembled from rebar and
      a salvaged office chair. Her warriors are everywhere. The smell of
      blood and gun oil is overpowering.
    biome: wasteland
    exits:
      south: raider-1
    npcs:
      - id: raider-warlord
        name: "Warlord Tharn"
        hp: 180
        attack: 22
        desc: "Tall, lean, terrifying. Half her face is a metal mask welded to bone. The Ash Raiders' founder and absolute ruler."
        loot_table_id: raider-warlord-loot
        dialogue:
          - trigger: always
            text: "Settler. Ironclad dog. Or just stupid? Whichever. You won't leave the camp alive."
      - id: raider-bodyguard
        name: "Tharn's Bodyguard"
        hp: 90
        attack: 16
        desc: "A massive raider in scrap-plate armor, carrying a rebar maul."
        loot_table_id: raider-loot
    items:
      - id: warlord-banner
        name: "Warlord's Banner"
        desc: "A tattered banner painted with a black sun. Symbol of Tharn's rule."

  - id: raider-3
    name: "The Slaver Pen"
    desc: |
      A wire-fenced pen where the Ash Raiders keep prisoners ‚ÄĒ captured
      caravan guards, settlers, anyone the warband decides is worth ransoming.
      Three captives huddle in the corner. A single raider stands guard,
      bored and dangerous.
    biome: wasteland
    exits:
      west: raider-1
    locks:
      - id: slaver-pen-gate
        exit: pen
        difficulty: 2
        keys: [pen-key]
    npcs:
      - id: raider-jailer
        name: "Raider Jailer"
        hp: 65
        attack: 12
        desc: "A bored raider with a key ring and a cattle prod."
        loot_table_id: raider-loot
      - id: captive-settler
        name: "Captive Settler"
        hp: 20
        attack: 0
        desc: "A captured settler, hands bound, eyes desperate."
        dialogue:
          - trigger: "quest_not_active:free-the-captives"
            text: "Please. Get the key from the jailer. There are three of us. Dusthaven will pay you."
            quest_id: free-the-captives
          - trigger: always
            text: "Hurry. Tharn's people come at sundown."
    items: []

  # ‚ĒÄ‚ĒÄ‚ĒÄ VAULT SUB-LEVELS (3 rooms) ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ

  - id: vault-0
    name: "Sub-Level B"
    desc: |
      Below the inhabited Vault, the air gets colder and the lights flicker.
      Pre-war signage points deeper: REACTOR / COMMAND. The Ghoul Collective
      doesn't come down here ‚ÄĒ they say the deep levels are haunted. They
      may be right.
    biome: ruins
    exits:
      up: ruins-2
      north: vault-1
      east: vault-2
    npcs:
      - id: vault-protectron
        name: "Maintenance Protectron"
        hp: 80
        attack: 14
        desc: "A pre-war service robot, still walking its patrol after two centuries. Its targeting array no longer recognizes friend from foe."
        loot_table_id: vault-loot
    items:
      - id: vault-terminal
        name: "Vault Terminal"
        desc: "A pre-war terminal, screen flickering. Logs scroll past too fast to read."
        readable: true
        content: "VAULT-TEC LOG ‚ÄĒ fragment\n[CORRUPTED] ... reactor stable ... CORE BREACH WARNING ... evacuation order ... [END FRAGMENT]"

  - id: vault-1
    name: "The Reactor"
    desc: |
      A massive pre-war fusion reactor, still humming. The chamber is
      bathed in sickly blue light from the containment cells. Radiation
      counters in the corner click furiously. The reactor is failing ‚ÄĒ
      slowly ‚ÄĒ and someone with the skill could either fix it or finish it.
    biome: ruins
    exits:
      south: vault-0
    locks:
      - id: reactor-control
        exit: control
        difficulty: 4
        keys: [reactor-key]
    npcs:
      - id: vault-mechanic
        name: "Sister Pneuma"
        hp: 55
        attack: 6
        desc: "A ghoul with mechanic's grease on her hands. She's been keeping the reactor running for sixty years. Alone."
        dialogue:
          - trigger: "quest_not_active:stabilize-reactor"
            text: "The reactor is dying. I can't fix it alone. If you can hotwire the secondary control panel, I can route around the failure. The Vault stays alive another decade."
            quest_id: stabilize-reactor
          - trigger: always
            text: "Sixty years I've kept it running. Sixty years and it still hums."
    items:
      - id: reactor-core-shard
        name: "Reactor Core Shard"
        desc: "A fragment of the failing reactor core. Glows. Probably lethal to carry long."
    resources:
      - id: reactor-salvage
        type: harvest
        respawn_actions: 10
        yields:
          - item_id: pre-war-circuitry
            name: "Pre-War Circuitry"
            desc: "Pulled from the reactor casing."
            tags: [component, gun-receiver]
            quality: refined
            stat_mods: {damage: 4, accuracy: 2}
            probability: 0.5
            count_min: 1
            count_max: 1
          - item_id: radiation-crystal
            name: "Radiation Crystal"
            desc: "Crystallized fallout from the reactor housing."
            probability: 0.3
            count_min: 1
            count_max: 1

  - id: vault-2
    name: "The Heart"
    desc: |
      The deepest chamber of the Vault. A circular room, ringed with
      pre-war seals. At the center, a sealed cryo-pod ‚ÄĒ frosted glass,
      faint blue light, a single human silhouette inside. A nameplate
      reads: VAULT-TEC PROJECT REVENANT. SUBJECT 001.
    biome: ruins
    exits:
      west: vault-0
    locks:
      - id: cryo-pod-seal
        exit: pod
        difficulty: 5
        keys: [cryo-key]
    npcs: []
    items:
      - id: cryo-pod
        name: "Cryo-Pod"
        desc: "A sealed pre-war cryo-pod containing a single, sleeping human. The seal is intact. The display reads: STABLE."
      - id: revenant-dossier
        name: "Project Revenant Dossier"
        desc: "A pre-war dossier sealed with a Vault-Tec stamp."
        readable: true
        content: "VAULT-TEC PROJECT REVENANT ‚ÄĒ confidential\n\nSubject 001: General Ada Voss, US Army (Ret.)\nObjective: Cryogenic preservation of strategic personnel for post-conflict reconstruction.\nStatus: STABLE. Awaiting authorized recovery code.\n\n[Note: the recovery code is encoded in three vault-key-fragments distributed across the facility.]"

  # ‚ĒÄ‚ĒÄ‚ĒÄ THE HOWLING PLAINS (4 rooms) ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ

  - id: plains-0
    name: "The Howl"
    desc: |
      An open plain of cracked clay and brown grass. The wind here is
      constant and loud ‚ÄĒ hence the name. The horizon goes on forever.
      Pre-war fence posts march across the landscape, leading to whatever
      is left out here.
    biome: wasteland
    exits:
      northeast: barrens-2
      west: plains-1
      north: plains-3
      south: plains-2
    npcs:
      - id: plains-wanderer
        name: "The Wanderer"
        hp: 50
        attack: 8
        desc: "A solitary figure in a long coat. They've been walking the plains for as long as anyone remembers. They never give a name."
        dialogue:
          - trigger: always
            text: "I walked east once. Took me three years to come back. There's nothing out there but the Howl. *They turn back to the horizon.*"
        trades:
          - id: wanderer-charm
            wants: [{id: caps, count: 30}]
            offers: [{id: wanderer-charm, name: "Wanderer's Charm", desc: "A bone disc on a leather thong. Old Mira swears it brings luck.", count: 1}]
    items: []
    resources:
      - id: plains-forage
        type: harvest
        respawn_actions: 4
        yields:
          - item_id: brown-grass
            name: "Brown Grass"
            desc: "Tough, fibrous grass. Burns hot."
            probability: 0.8
            count_min: 1
            count_max: 3
          - item_id: cloth-strip
            name: "Cloth Strip"
            desc: "Torn from an old fence-flag."
            probability: 0.3
            count_min: 1
            count_max: 1

  - id: plains-1
    name: "Burned Homestead"
    desc: |
      The collapsed remains of a pre-war farmhouse, blackened by fire.
      A cellar door stands open, untouched. Nobody has lived here in
      generations ‚ÄĒ but somebody died here recently. Crows circle.
    biome: wasteland
    exits:
      east: plains-0
    npcs:
      - id: feral-dog
        name: "Feral Dog"
        hp: 30
        attack: 9
        desc: "A wasteland dog, mangy and starved. It growls but doesn't run."
        loot_table_id: wasteland-loot
    items:
      - id: family-photo
        name: "Family Photo"
        desc: "A scorched photograph. Two children, a dog, a porch."
        readable: true
        content: "On the back, in faded pencil:\n'Ada, Sam, Daisy ‚ÄĒ last summer before deployment.'"
      - id: hidden-cellar-key
        name: "Cellar Key"
        desc: "A small brass key. Maybe for the cellar door."
    resources:
      - id: homestead-cellar
        type: harvest
        respawn_actions: 12
        yields:
          - item_id: canned-food
            name: "Canned Food"
            desc: "Pre-war preserve, miraculously sealed."
            probability: 0.7
            count_min: 1
            count_max: 3
          - item_id: clean-water
            name: "Clean Water"
            desc: "Sealed in a pre-war jar."
            probability: 0.5
            count_min: 1
            count_max: 2
          - item_id: stimpak
            name: "Stimpak"
            desc: "Old but still good."
            probability: 0.2
            count_min: 1
            count_max: 1

  - id: plains-2
    name: "Crashed Aircraft"
    desc: |
      The fuselage of a pre-war military transport, half-buried in the
      clay. The ramp is jammed open. Inside, the remains of a squad ‚ÄĒ
      and the cargo they were carrying. Vault-Tec markings on the crates.
    biome: wasteland
    exits:
      north: plains-0
    locks:
      - id: cargo-crate
        exit: crate
        difficulty: 4
        keys: [cargo-key]
    npcs:
      - id: scavver-rival
        name: "Tess the Picker"
        hp: 60
        attack: 11
        desc: "A rival scavver who got here first. She's not happy to share."
        loot_table_id: raider-loot
        dialogue:
          - trigger: always
            text: "Find your own crash. This one's mine. *She levels her shotgun.*"
    items:
      - id: pilot-log
        name: "Pilot's Log"
        desc: "A leather-bound flight log."
        readable: true
        content: "PILOT'S LOG ‚ÄĒ last entry\n'Cargo: Project Revenant components. Routing to Vault 7. Reactor parts and one cryo-key.\nGroundfire from below. Losing altitude. Going down west of the Crater. May god‚ÄĒ'\n[the entry ends]"
      - id: crash-cargo
        name: "Cargo Crate"
        desc: "A reinforced military crate, stamped with the Vault-Tec eagle."

  - id: plains-3
    name: "Lone Mesa"
    desc: |
      A solitary mesa rising from the plains, weathered red rock against
      a bone-grey sky. A goat path winds up to the top. From the summit
      you can see for miles in every direction ‚ÄĒ Dusthaven smoke to the
      east, the Vault skyline north, the chemical plant glow south.
    biome: wasteland
    exits:
      south: plains-0
    npcs:
      - id: hermit-seer
        name: "The Mesa Seer"
        hp: 45
        attack: 5
        desc: "A blind ghoul-kin elder, ancient beyond reckoning. They sit at the summit and watch with eyes that can no longer see."
        dialogue:
          - trigger: always
            text: "I see four hands reaching for the same buried thing. Yours is one of them. Choose carefully who you stand with ‚ÄĒ the Vault remembers. *They tilt their head toward you.* The cryo-pod is real. The general inside is real. What you wake will reshape the wastes."
        trades:
          - id: seer-vision
            wants: [{id: caps, count: 50}]
            offers: [{id: seer-token, name: "Seer's Token", desc: "A polished river stone. The Seer says it sees what you cannot.", count: 1}]
    items:
      - id: mesa-cairn
        name: "Stone Cairn"
        desc: "A waist-high cairn of stones, each one carved with a name. Some names are recent."

  - id: flats-2
    name: "Chemical Plant"
    desc: |
      The skeleton of a pre-war chemical plant. Twisted pipes, ruptured
      tanks, and a green chemical fog clinging to the floor. It smells
      of rot and rust and something sharper, sweeter, wrong. RadAway
      and pre-war chems are scattered in the wreckage ‚ÄĒ if you're
      brave enough to take them.
    biome: ruins
    exits:
      west: flats-0
    npcs:
      - id: chem-feral
        name: "Chem-Sick Ghoul"
        hp: 55
        attack: 13
        desc: "An irradiated ghoul too far gone to speak. Glowing veins under translucent skin."
        loot_table_id: ghoul-chem-loot
      - id: rogue-chemist
        name: "Vex the Rogue Chemist"
        hp: 50
        attack: 8
        desc: "A surviving pre-war chemist gone half-feral. Wears a cracked respirator. Sells what she can synthesize."
        dialogue:
          - trigger: always
            text: "Caps for chems. No questions, no refunds. *coughs into her sleeve*"
        trades:
          - id: vex-buffout
            wants: [{id: caps, count: 22}]
            offers: [{id: buffout, name: "Buffout", desc: "Pre-war combat stim.", count: 1}]
          - id: vex-medx
            wants: [{id: caps, count: 18}]
            offers: [{id: med-x, name: "Med-X", desc: "Pre-war painkiller. Heals 15 HP.", count: 1}]
          - id: vex-radaway
            wants: [{id: caps, count: 14}]
            offers: [{id: radaway, name: "RadAway", desc: "Flushes radiation.", count: 1}]
    items:
      - id: warning-placard
        name: "Hazard Placard"
        desc: "DANGER ‚ÄĒ TOXIC ATMOSPHERE ‚ÄĒ RESPIRATORS REQUIRED"
        readable: true
        content: "VAULT-TEC CHEMICAL PLANT 7\nDANGER: Toxic atmosphere. Respirators required.\nAuthorized personnel only.\n[The sign is faded. Nobody is authorized anymore.]"
    resources:
      - id: chem-salvage
        type: harvest
        respawn_actions: 7
        yields:
          - item_id: radaway
            name: "RadAway"
            desc: "Recovered chem pack."
            probability: 0.4
            count_min: 1
            count_max: 1
          - item_id: empty-syringes-5
            name: "Empty Syringes"
            desc: "Reusable injectors. Crafting reagent."
            probability: 0.5
            count_min: 1
            count_max: 1
          - item_id: glowing-relic
            name: "Glowing Relic"
            desc: "A pre-war ceramic shard, faintly luminescent."
            probability: 0.1
            count_min: 1
            count_max: 1

