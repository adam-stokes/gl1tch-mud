weather_table:
  - biome: settlement
    possible: [clear, overcast, ashfall]
  - biome: wasteland
    possible: [clear, ashstorm, radiation-fog, scorching]
  - biome: ruins
    possible: [clear, dead-calm, radiation-fog, tremor]

factions:
  - id: settlers
    name: "The Settlers"
    desc: |
      Survivors who pooled resources to build Dusthaven. They want walls,
      clean water, and to be left alone.
    agenda: "Fortify the settlement, push raiders out of the Barrens."
    territory: [dusthaven-0, dusthaven-1, dusthaven-2, dusthaven-3]
    allies: [ironclad]
    enemies: [ash-raiders]

  - id: ash-raiders
    name: "The Ash Raiders"
    desc: |
      Nomadic scavengers who claim the Barrens by force.
      They don't build ‚ÄĒ they take.
    agenda: "Raid Dusthaven, control the Crater, burn the Vault."
    territory: [barrens-0, barrens-1]
    allies: []
    enemies: [settlers, ironclad]

  - id: ironclad
    name: "The Ironclad"
    desc: |
      Ex-military remnant, obsessed with reclaiming pre-war tech from the Vault.
      Rigid, disciplined, ruthless.
    agenda: "Open the Vault, recover the pre-war weapons cache, establish martial law."
    territory: [barrens-2, ruins-0, ruins-1, ruins-2]
    allies: [settlers]
    enemies: [ash-raiders, ghoul-collective]

  - id: ghoul-collective
    name: "The Ghoul Collective"
    desc: |
      Irradiated survivors living in the deep ruins. Misunderstood, ancient,
      and sitting on secrets. ruins-1 and ruins-2 are contested with the Ironclad.
    agenda: "Keep outsiders out of the Vault ‚ÄĒ it's not a weapons cache, it's their home."
    territory: [ruins-1, ruins-2]
    allies: []
    enemies: [ironclad]

