quests:
  - id: q-first-forge-1
    title: "First Forge: Gather"
    description: |
      Apprentice Brix wants to see what you can do.
      Gather 5 sticks from the meadow ‚ÄĒ type 'gather'. There's also an old tree stump
      in the town square you can harvest logs from with 'harvest tree-stump'.
    giver_npc_id: apprentice-brix
    obj_type: gather
    obj_target: stick
    obj_count: 5
    reward_credits: 0
    reward_xp_skill: crafting
    reward_xp_amount: 10
    reward_item_id: wood-log
    reward_item_name: "Wood Log"
    reward_item_desc: "A rough log from the meadow stump."
    next_quest_id: q-first-forge-2

  - id: q-first-forge-2
    title: "First Forge: Stone Sword"
    description: |
      Brix wants you to craft a stone sword. Mine some stone in the workshop
      with your pickaxe ('mine stone-deposits'), then type 'craft stone-sword' (needs 2 stone + 1 stick).
    giver_npc_id: apprentice-brix
    obj_type: craft
    obj_target: stone-sword
    obj_count: 1
    reward_credits: 0
    reward_xp_skill: crafting
    reward_xp_amount: 15
    reward_item_id: iron-ore
    reward_item_name: "Iron Ore"
    reward_item_desc: "Raw iron ore. Smelt it into an ingot."
    next_quest_id: q-first-forge-3

  - id: q-first-forge-3
    title: "First Forge: Smelt"
    description: |
      Use the furnace in the Builder's Workshop to smelt 1 iron ingot.
      You need 1 iron-ore and 1 coal (or wood-log) as fuel. Type 'smelt iron-ore'.
    giver_npc_id: apprentice-brix
    obj_type: smelt
    obj_target: iron-ingot
    obj_count: 1
    reward_credits: 0
    reward_xp_skill: crafting
    reward_xp_amount: 20
    reward_item_id: crude-iron-chest
    reward_item_name: "Crude Iron Chestplate"
    reward_item_desc: "A rough iron chestplate. 3 defense."
    next_quest_id: q-first-forge-4

  - id: q-first-forge-4
    title: "First Forge: Assembly"
    description: |
      Head up to the ruins workshop above Meadow Town Square (type 'up' from the square).
      The scrap-forge there has parts ready to use ‚ÄĒ assemble a pipe-pistol:
      'craft pipe-pistol frame=pipe-frame-crude barrel=copper-tube-crude'.
    giver_npc_id: apprentice-brix
    obj_type: assemble
    obj_target: pipe-pistol
    obj_count: 1
    reward_credits: 100
    reward_xp_skill: crafting
    reward_xp_amount: 30
    reward_item_id: ""
    reward_item_name: ""
    reward_item_desc: ""
    next_quest_id: ""

  - id: q-meadow-shard
    title: "The Wilting Meadow"
    description: |
      Elder Mason says the Meadow Shard landed somewhere in the meadow fields ‚ÄĒ likely carried
      by the Stoneling Chieftain, who has been unusually aggressive since the Core shattered.
      Defeat the Stoneling Chieftain and retrieve the Meadow Shard.
    giver_npc_id: elder-mason
    obj_type: kill
    obj_target: stoneling-chieftain
    obj_count: 1
    reward_credits: 150
    reward_xp_skill: combat
    reward_xp_amount: 30
    reward_item_id: meadow-shard
    reward_item_name: "Meadow Shard"
    reward_item_desc: "A warm, flower-scented shard of the Crystal Core. One of five."

  - id: q-forest-shard
    title: "Root of the Problem"
    description: |
      Warden Sylara says the Forest Shard sank into the Ancient Root Vein beneath the oldest oak.
      Mine it out ‚ÄĒ but bring a strong pickaxe.
    giver_npc_id: warden-sylara
    obj_type: mine
    obj_target: ancient-root-vein
    obj_count: 1
    reward_credits: 120
    reward_xp_skill: mining
    reward_xp_amount: 25
    reward_item_id: forest-shard
    reward_item_name: "Forest Shard"
    reward_item_desc: "A green, leaf-scented shard of the Crystal Core. One of five."

  - id: q-desert-shard
    title: "Lost to the Sand"
    description: |
      Archivist Dunes says the Desert Shard is sealed inside the Sandstone Ruins. The ancient
      lock can only be opened by solving the ruin's security terminal.
    giver_npc_id: archivist-dunes
    obj_type: hack
    obj_target: ruin-terminal
    obj_count: 1
    reward_credits: 200
    reward_xp_skill: hacking
    reward_xp_amount: 30
    reward_item_id: desert-shard
    reward_item_name: "Desert Shard"
    reward_item_desc: "A sun-warm shard of the Crystal Core. One of five."

  - id: q-mountain-shard
    title: "The Frozen Forge"
    description: |
      Ironmaster Breck says the Mountain Shard is embedded in a block of magical ice deep in the
      Snow Peaks. You need to forge a Frostcore Ingot to unlock it. Smelt frost-essence with
      iron-ingot in a furnace to create the ingot.
    giver_npc_id: ironmaster-breck
    obj_type: retrieve
    obj_target: frostcore-ingot
    obj_count: 1
    reward_credits: 175
    reward_xp_skill: mining
    reward_xp_amount: 25
    reward_item_id: mountain-shard
    reward_item_name: "Mountain Shard"
    reward_item_desc: "A cold, frost-kissed shard of the Crystal Core. One of five."

  - id: q-cave-shard
    title: "Into the Dark"
    description: |
      Elder Voss says the Cave Shard rests in the Crystal Cavern at the deepest point of the
      caves. The Deepborn have been guarding it since the Core shattered. Re-light the Crystal
      Flame to claim the shard.
    giver_npc_id: elder-voss
    obj_type: hack
    obj_target: flame-terminal
    obj_count: 1
    reward_credits: 250
    reward_xp_skill: hacking
    reward_xp_amount: 30
    reward_item_id: cave-shard
    reward_item_name: "Cave Shard"
    reward_item_desc: "A deep-glowing shard of the Crystal Core. One of five."

  - id: q-cinder-return
    title: "Cinder's Return"
    description: |
      Elder Mason says a golden glow has appeared in the Snow Peaks ‚ÄĒ Cinder's hiding place.
      You carry all five Crystal Shards. Travel to Cinder's Hideaway and convince the dragon
      to help restore the Crystal Core.
    giver_npc_id: elder-mason
    obj_type: retrieve
    obj_target: crystal-key
    obj_count: 1
    reward_credits: 500
    reward_xp_skill: combat
    reward_xp_amount: 100
    reward_item_id: crystal-key
    reward_item_name: "Crystal Key"
    reward_item_desc: "A key formed from the warmth of five Crystal Shards. Opens the path to Cinder."

rooms:
  - id: meadow-0
    name: "Meadow Town Square"
    biome: meadow
    desc: |
      The heart of Meadow Town. Cobblestone paths wind between cheerful buildings, though
      the flower beds that once lined every wall are wilted and grey. At the center stands
      a stone pedestal ‚ÄĒ empty where the Crystal Core once floated. Elder Mason paces near it,
      his brow furrowed.
    exits:
      north: meadow-1
      east: forest-0
      south: desert-0
      west: snow-0
      up: ruins-workshop-meadow
    npcs:
      - id: elder-mason
        name: "Elder Mason"
        hp: 0
        attack: 0
        desc: "The leader of the Stoneguard. An old dwarf with calloused hands and worried eyes."
        dialogue:
          - trigger: always
            text: |
              "Welcome to Meadow Town, traveller. The Crystal Core is gone ‚ÄĒ shattered by a young
              dragon named Cinder. Without it, our world is fading. Will you help us restore it?"
            quest_id: q-meadow-shard
          - trigger: has_all_shards
            text: |
              "You have all five shards. A golden glow appeared in the Snow Peaks just this morning.
              I believe Cinder is there. Go ‚ÄĒ and bring those shards with you."
            quest_id: q-cinder-return
      - id: stoneling-chieftain
        name: "Stoneling Chieftain"
        hp: 60
        attack: 12
        desc: "A hulking stoneling, larger than the rest. Its eyes glow faintly ‚ÄĒ like it swallowed something magical."
        loot_table_id: stoneling-loot
        dialogue: []
    items:
      - id: builders-map
        name: "Builder's Map"
        desc: "A hand-drawn map of Blockhaven with notes on all five biomes."
        readable: true
        content: |
          BLOCKHAVEN ‚ÄĒ A TRAVELLER'S GUIDE

          The Crystal Core once floated above Meadow Town Square, giving each biome its colour
          and life. A young dragon named Cinder accidentally shattered it. Five Crystal Shards
          scattered to the five biomes.

          THE FIVE BIOMES:
          ‚ÄĒ Meadow (north): Home of the Stoneguard builders. The wilting has begun.
          ‚ÄĒ Forest (east): Home of the Thornwalkers. Ancient trees are going dormant.
          ‚ÄĒ Desert (south): Home of the Dunekeepers. Ruins are sinking fast.
          ‚ÄĒ Snow Peaks (west): Home of the Frostborn. Cinder fled here.
          ‚ÄĒ Deep Caves (down from caves-0): Home of the Deepborn. The dark is spreading.

          YOUR GOAL: Collect all five Crystal Shards. Find Cinder. Restore the Core.

          NEW COMMANDS: mine, harvest, gather, smelt, plant, build, enchant, weather, deathpile
          If you die: your items drop where you fell. Use 'deathpile' to find them.
    resources:
      - id: tree-stump
        type: harvest
        yields:
          - item_id: wood-log
            name: "Wood Log"
            desc: "A rough log pulled from an old stump."
            probability: 1.0
            count_min: 1
            count_max: 2
        tool_required: ""
        respawn_actions: 20

  - id: meadow-1
    name: "The Builder's Workshop"
    biome: meadow
    desc: |
      A wide workshop filled with the smell of sawdust and coal smoke. A stone furnace
      glows steadily in one corner, and a solid workbench dominates the center of the room.
      Apprentice Brix is sorting tool handles when you enter.
    exits:
      south: meadow-0
    npcs:
      - id: apprentice-brix
        name: "Apprentice Brix"
        hp: 0
        attack: 0
        desc: "A young Stoneguard apprentice. Enthusiastic and helpful, even on bad days."
        trades:
          - id: brix-trade-1
            wants: [{id: wood-log, count: 4}]
            offers: [{id: stick, name: "Stick", desc: "A sturdy stick.", count: 8}]
          - id: brix-trade-2
            wants: [{id: iron-ingot, count: 2}]
            offers: [{id: iron-sword, name: "Iron Sword", desc: "A sharp iron sword. 12 attack.", count: 1}]
        dialogue:
          - trigger: quest_active:q-first-forge-4
            text: "Head up to the ruins workshop ‚ÄĒ type 'up' from the town square. The scrap-forge there has parts ready. Give it a try."
          - trigger: quest_active:q-first-forge-3
            text: "Toss that iron-ore in the furnace with some coal. Type 'smelt iron-ore'. The coal-stack is right there."
          - trigger: quest_active:q-first-forge-2
            text: "Now craft a stone sword. You need 2 stone and 1 stick. Type 'craft stone-sword'. Mine the deposits here if you need more stone."
          - trigger: quest_active:q-first-forge-1
            text: "The meadow's full of sticks if you look. Type 'gather' and collect five. Oh ‚ÄĒ there's an old stump in the square too, try 'harvest tree-stump'."
          - trigger: skill_gte:mining:2
            text: "Nice pickaxe work. You're getting good at this. Ask me about iron gear when you have the ingots."
          - trigger: always
            text: "The workbench is yours to use! Type 'craft' to see what you can make. I've got a few tasks for you ‚ÄĒ good way to learn the ropes."
            quest_id: q-first-forge-1
    items:
      - id: coal-stack
        name: "Coal Stack"
        desc: "A small pile of coal for the furnace."
        signal_tier: noise
    resources:
      - id: stone-deposits
        type: mine
        yields:
          - item_id: stone
            name: "Stone"
            desc: "A rough stone block."
            probability: 0.9
            count_min: 2
            count_max: 4
          - item_id: flint
            name: "Flint"
            desc: "Sharp flint."
            probability: 0.4
            count_min: 1
            count_max: 2
        tool_required: pickaxe
        respawn_actions: 15
      - id: iron-vein
        type: mine
        yields:
          - item_id: iron-ore
            name: "Iron Ore"
            desc: "Raw iron ore. Smelt it into an ingot."
            probability: 0.7
            count_min: 1
            count_max: 2
        tool_required: pickaxe
        respawn_actions: 30
    systems:
      - id: furnace
        security_level: 0
        reward_text: "The furnace is already lit. Use 'smelt <ore>' to process materials."

  - id: forest-0
    name: "Forest Entrance"
    biome: forest
    desc: |
      The forest begins here ‚ÄĒ a wall of ancient trees whose canopy filters the light to a
      cool green. The Thornwalkers keep a small patrol post at the treeline. Warden Sylara
      stands with her arms crossed, watching the trees with concern.
    exits:
      west: meadow-0
      east: forest-1
      north: ruins-workshop-forest
    npcs:
      - id: warden-sylara
        name: "Warden Sylara"
        hp: 0
        attack: 0
        desc: "Tall, lean, and watchful. A Thornwalker ranger who has walked these paths for thirty years."
        dialogue:
          - trigger: always
            text: "The trees are barely breathing. The Forest Shard sank into the Ancient Root Vein in the oak grove to the east. I can't reach it ‚ÄĒ the roots are too thick. Can you mine it out?"
            quest_id: q-forest-shard
          - trigger: skill_gte:mining:1
            text: "You have a pickaxe. Good. The Ancient Root Vein is tough ‚ÄĒ a stone pickaxe or better will do it."
      - id: thornsprite
        name: "Thornsprite"
        hp: 15
        attack: 4
        desc: "A small creature made of twisted branches and thorns. Hostile but fragile."
        loot_table_id: thornsprite-loot
        dialogue: []
    items: []
    resources:
      - id: forest-herbs
        type: harvest
        yields:
          - item_id: herb
            name: "Forest Herb"
            desc: "A medicinal herb. Useful for crafting."
            probability: 0.8
            count_min: 1
            count_max: 3
        tool_required: ""
        respawn_actions: 10

  - id: forest-1
    name: "Ancient Oak Grove"
    biome: forest
    desc: |
      A cathedral of ancient oaks so tall their tops vanish into mist. Roots thick as houses
      twist across the ground. At the base of the largest oak, a faint golden glow pulses
      from deep within the roots ‚ÄĒ the Forest Shard. A Vine Creeper coils nearby.
    exits:
      west: forest-0
    npcs:
      - id: vine-creeper
        name: "Vine Creeper"
        hp: 25
        attack: 7
        desc: "A mass of animated vines with glowing green eyes. It guards the old oak."
        loot_table_id: vine-creeper-loot
        dialogue: []
    items: []
    resources:
      - id: ancient-oak
        type: harvest
        yields:
          - item_id: wood-log
            name: "Wood Log"
            desc: "A thick log from an ancient oak."
            probability: 1.0
            count_min: 2
            count_max: 4
          - item_id: rare-seed
            name: "Rare Seed"
            desc: "A seed from an ancient tree. Plant it to grow something special."
            probability: 0.2
            count_min: 1
            count_max: 1
        tool_required: axe
        respawn_actions: 30
      - id: ancient-root-vein
        type: mine
        yields:
          - item_id: forest-shard
            name: "Forest Shard"
            desc: "A green, leaf-scented shard of the Crystal Core. One of five."
            probability: 1.0
            count_min: 1
            count_max: 1
        tool_required: pickaxe
        respawn_actions: 9999

  - id: desert-0
    name: "Desert Gateway"
    biome: desert
    desc: |
      The meadow gives way to sand at a crumbling stone arch ‚ÄĒ an ancient marker that once
      read "Dunekeeper Territory." Half the inscription has been swallowed by a drifting dune.
      A Dunekeeper scout in amber robes watches the horizon with a brass spyglass.
    exits:
      north: meadow-0
      east: desert-1
      south: ruins-workshop-desert
    npcs:
      - id: dunekeeper-scout
        name: "Dunekeeper Scout"
        hp: 0
        attack: 0
        desc: "A lean Dunekeeper with sun-darkened skin and a sharp eye for trouble."
        dialogue:
          - trigger: always
            text: "The ruins are to the east. Archivist Dunes will want to speak with you. Watch out for Sand Golems ‚ÄĒ they've been restless since the Core shattered."
          - trigger: has_item:desert-shard
            text: "You found it! The Archivist will be overjoyed. Safe travels."
      - id: dune-stalker
        name: "Dune Stalker"
        hp: 20
        attack: 6
        desc: "A predatory desert creature that blends into the sand. Attacks without warning."
        loot_table_id: thornsprite-loot
        dialogue: []
    items: []
    resources:
      - id: desert-sand
        type: mine
        yields:
          - item_id: sand
            name: "Sand"
            desc: "Fine desert sand."
            probability: 1.0
            count_min: 3
            count_max: 6
        tool_required: ""
        respawn_actions: 5

  - id: desert-1
    name: "Sandstone Ruins"
    biome: desert
    desc: |
      Pillars of carved sandstone rise from the dunes ‚ÄĒ the remains of an ancient Dunekeeper
      archive. Most of the structure has sunk into the sand, but one sealed chamber still stands.
      Archivist Dunes crouches over a half-buried tablet. A Sand Golem stands motionless nearby,
      waiting.
    exits:
      west: desert-0
    npcs:
      - id: archivist-dunes
        name: "Archivist Dunes"
        hp: 0
        attack: 0
        desc: "An elderly Dunekeeper with ink-stained fingers and a mind full of ancient puzzles."
        dialogue:
          - trigger: always
            text: "The Desert Shard is sealed in the inner chamber. The ruin-terminal controls the lock ‚ÄĒ it was built to keep looters out. Can you solve it? The security level is only 2."
            quest_id: q-desert-shard
          - trigger: has_item:desert-shard
            text: "Incredible! You actually solved it. The shard is yours ‚ÄĒ for now. Use it to restore the Core."
      - id: sand-golem
        name: "Sand Golem"
        hp: 40
        attack: 10
        desc: "A towering construct of animated sandstone. Slow, but hits like a boulder."
        loot_table_id: sand-golem-loot
        dialogue: []
    items: []
    systems:
      - id: ruin-terminal
        security_level: 2
        reward_item: desert-shard
        reward_text: "The ancient lock clicks open. The Desert Shard tumbles out into your hands."

  - id: snow-0
    name: "Mountain Pass"
    biome: snow
    desc: |
      The path into the Snow Peaks winds upward through biting wind. Ice-covered stones
      line the pass, and a Frost Wraith circles in the grey sky above. To the west, a
      narrow trail leads deeper into the mountains. A heavy stone slab blocks a side passage
      ‚ÄĒ there's a faint golden glow underneath it.
    exits:
      east: meadow-0
      west: snow-1
      south: ruins-workshop-snow
    locks:
      - id: cinder-passage-lock
        exit: north
        difficulty: 0
        keys: [crystal-key]
    npcs:
      - id: frost-wraith-patrol
        name: "Frost Wraith"
        hp: 35
        attack: 12
        desc: "A spectral shape made of howling ice and wind. It attacks with frozen claws."
        loot_table_id: frost-wraith-loot
        dialogue: []
    items: []
    resources:
      - id: ice-vein
        type: mine
        yields:
          - item_id: ice
            name: "Ice"
            desc: "A clear chunk of magical ice."
            probability: 0.9
            count_min: 1
            count_max: 3
          - item_id: diamond
            name: "Diamond"
            desc: "A rare, brilliant diamond."
            probability: 0.05
            count_min: 1
            count_max: 1
        tool_required: pickaxe
        respawn_actions: 25

  - id: snow-1
    name: "Frost Village"
    biome: snow
    desc: |
      A cluster of stone-and-ice buildings carved into the mountainside. Fires burn in iron
      braziers, and the clang of hammer on anvil echoes from the forge. Ironmaster Breck stands
      at the largest anvil, a frown on his face and a Frostborn battle axe across his back.
    exits:
      east: snow-0
    npcs:
      - id: ironmaster-breck
        name: "Ironmaster Breck"
        hp: 0
        attack: 0
        desc: "A barrel-chested Frostborn smith. He trusts tools more than people, but respects both when they're good."
        trades:
          - id: breck-trade-1
            wants: [{id: iron-ingot, count: 3}]
            offers: [{id: iron-pickaxe, name: "Iron Pickaxe", desc: "An iron pickaxe. Can mine gold and rare ores.", count: 1}]
          - id: breck-trade-2
            wants: [{id: gold-ingot, count: 2}]
            offers: [{id: gold-sword, name: "Gold Sword", desc: "A gilded sword. 18 attack.", count: 1}]
        dialogue:
          - trigger: always
            text: "To forge the Frostcore Ingot you need frost-essence from a Frost Wraith, plus an iron ingot. Bring both to a furnace. That's how you claim the Mountain Shard."
            quest_id: q-mountain-shard
          - trigger: has_item:mountain-shard
            text: "So you did it. Good. The Mountain holds its shard no longer."
      - id: ice-crawler
        name: "Ice Crawler"
        hp: 20
        attack: 5
        desc: "A six-legged insect the size of a dog, armored in frost-crystal chitin."
        loot_table_id: frost-wraith-loot
        dialogue: []
    items: []
    systems:
      - id: forge-furnace
        security_level: 0
        reward_text: "The forge burns hot. Use 'smelt <ore>' to process materials."

  - id: caves-0
    name: "Cave Entrance"
    biome: caves
    desc: |
      A yawning opening in the earth, framed by hanging moss and the faint smell of minerals.
      The air gets cold fast and the light fades within a few steps. A Deepborn scout stands
      at the threshold, holding a glowstone lantern.
    exits:
      up: meadow-0
      down: caves-1
      south: ruins-workshop-caves
    npcs:
      - id: deepborn-scout
        name: "Deepborn Scout"
        hp: 0
        attack: 0
        desc: "A quiet, careful figure wrapped in cave-cloth. They move silently and speak rarely."
        dialogue:
          - trigger: always
            text: "The Crystal Cavern is below. Elder Voss waits for you. Bring a weapon ‚ÄĒ Cave Lurkers nest on the path."
          - trigger: has_item:cave-shard
            text: "The Crystal Flame burns again. Elder Voss will be pleased."
      - id: cave-lurker
        name: "Cave Lurker"
        hp: 30
        attack: 9
        desc: "A pale, eyeless predator that hunts by sound. It moves fast and hits hard."
        loot_table_id: cave-lurker-loot
        dialogue: []
    items: []
    resources:
      - id: coal-seam
        type: mine
        yields:
          - item_id: coal
            name: "Coal"
            desc: "A lump of coal. Burns as fuel."
            probability: 0.9
            count_min: 2
            count_max: 4
        tool_required: pickaxe
        respawn_actions: 20
      - id: iron-vein
        type: mine
        yields:
          - item_id: iron-ore
            name: "Iron Ore"
            desc: "Raw iron ore. Smelt it into an ingot."
            probability: 0.8
            count_min: 1
            count_max: 3
        tool_required: pickaxe
        respawn_actions: 20

  - id: caves-1
    name: "Crystal Cavern"
    biome: caves
    desc: |
      The deepest room in Blockhaven. Ancient crystal formations line the walls, still faintly
      glowing despite the Core's absence. At the center stands a stone altar with an extinguished
      flame ‚ÄĒ the Crystal Flame. Elder Voss of the Deepborn sits cross-legged beside it,
      waiting. A Crystal Shade circles in the dark above.
    exits:
      up: caves-0
    npcs:
      - id: elder-voss
        name: "Elder Voss"
        hp: 0
        attack: 0
        desc: "An ancient Deepborn elder. Their skin is pale as quartz, their eyes glow faintly blue."
        dialogue:
          - trigger: always
            text: "The Crystal Flame has been dark since the Core shattered. The flame-terminal controls it. Use your hacking skills ‚ÄĒ the security is modest, but the lock is old. Restore the flame and the Cave Shard is yours."
            quest_id: q-cave-shard
          - trigger: has_item:cave-shard
            text: "The Crystal Flame burns again. Now collect the remaining shards and find Cinder. The Deepborn will remember your courage."
      - id: crystal-shade
        name: "Crystal Shade"
        hp: 50
        attack: 15
        desc: "A creature of living shadow and broken crystal. The most dangerous thing in the caves."
        loot_table_id: crystal-shade-loot
        dialogue: []
    items: []
    systems:
      - id: flame-terminal
        security_level: 2
        reward_item: cave-shard
        reward_text: "The Crystal Flame ignites with a warm roar. The Cave Shard rises from the altar and hovers before you."

  - id: ember-0
    name: "Cinder's Hideaway"
    biome: snow
    desc: |
      A hidden cave behind a frozen waterfall, warm despite the blizzard outside. The walls
      are scorched in patterns that look almost like apologies. Cinder ‚ÄĒ a young dragon the
      size of a large horse, scales shimmering copper and gold ‚ÄĒ huddles near a pile of melted
      ice. She raises her head when you enter, and her eyes go wide at the shards you carry.
    exits:
      south: snow-0
    npcs:
      - id: cinder
        name: "Cinder"
        hp: 0
        attack: 0
        desc: "A young copper-and-gold dragon. She broke the Crystal Core by accident and has been hiding here ever since."
        dialogue:
          - trigger: always
            text: "Please don't be angry. I didn't mean to ‚ÄĒ I was just playing and I hit it and everything shattered and I've been so sorry ever since and I didn't know how to fix it."
          - trigger: has_all_shards
            text: "You have all five shards. I can feel them. If you give them to me, I can breathe them back together ‚ÄĒ dragon fire and crystal magic are the only thing that can restore the Core. Are you ready?"
            quest_id: q-cinder-return
    items:
      - id: dragon-scale-fragment
        name: "Dragon Scale Fragment"
        desc: "A copper-gold scale Cinder shed. Surprisingly warm to the touch."
        readable: false

  - id: ruins-workshop-meadow
    name: Ruins Workshop
    biome: meadow
    desc: >
      Crumbling stone walls frame a surprisingly intact workshop. Ancient tools hang
      from rusted pegs. A Scrap Forge glows faintly in the corner beside a battered
      iron Anvil.
    workbench_types: [scrap-forge, anvil]
    exits:
      down: meadow-0
    npcs: []
    items:
      - id: pipe-frame-crude
        name: Pipe Frame
        desc: A rough length of iron pipe bent into a gun frame shape.
        tags: [component, gun-frame]
        quality: crude
        stat_mods: {}
      - id: copper-tube-crude
        name: Copper Tube
        desc: A salvaged copper pipe. Could serve as a gun barrel.
        tags: [component, gun-barrel]
        quality: crude
        stat_mods: {damage: 1, range: 1}
      - id: wrapped-grip-crude
        name: Wrapped Grip
        desc: Leather strips wound around a piece of wood.
        tags: [component, gun-stock]
        quality: crude
        stat_mods: {range: 1}
      - id: leather-plate-crude
        name: Leather Plate
        desc: A piece of cured leather for chest armor.
        tags: [component, armor-chest]
        quality: crude
        stat_mods: {defense: 1}
      - id: hide-pad-crude
        name: Hide Pad
        desc: A pad of cured animal hide for shoulder protection.
        tags: [component, armor-shoulder]
        quality: crude
        stat_mods: {defense: 1}
      - id: woven-moss-crude
        name: Woven Moss
        desc: Dense cave moss woven into a soft lining.
        tags: [component, armor-lining]
        quality: crude
        stat_mods: {comfort: 1}
    resources: []

  - id: ruins-workshop-forest
    name: Ruins Workshop
    biome: forest
    desc: >
      Vines have grown through the cracked windows but left the forge and anvil
      untouched ‚ÄĒ as if the forest respects what is made here.
    workbench_types: [scrap-forge, anvil]
    exits:
      south: forest-0
    npcs: []
    items: []
    resources: []

  - id: ruins-workshop-desert
    name: Ruins Workshop
    biome: desert
    desc: >
      Sand coats every surface but the forge is still hot ‚ÄĒ heated by a buried
      crystal vein. The anvil is scarred but solid.
    workbench_types: [scrap-forge, anvil]
    exits:
      north: desert-0
    npcs: []
    items: []
    resources: []

  - id: ruins-workshop-snow
    name: Ruins Workshop
    biome: snow
    desc: >
      Frost clings to the walls but the forge melts it away in a small circle
      of warmth. The anvil rings clearly in the cold air.
    workbench_types: [scrap-forge, anvil]
    exits:
      north: snow-0
    npcs: []
    items: []
    resources: []

  - id: ruins-workshop-caves
    name: Ruins Workshop
    biome: caves
    desc: >
      Deep in the cave network, this workshop was hidden from the surface world.
      The forge burns with a blue-tinged flame. The anvil is carved from deepstone.
    workbench_types: [scrap-forge, anvil]
    exits:
      north: caves-0
    npcs: []
    items: []
    resources: []
