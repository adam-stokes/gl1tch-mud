  tagline: "the ruins remember everything."
  theme:
    bg: "#1a1a2e"
    fg: "#e0d7c6"
    accent: "#c9a84c"
    dim: "#6b5d4f"
    border: "#3d3228"
    error: "#c0392b"
    success: "#27ae60"
